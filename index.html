<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoplun - Attendance Dashboard</title>
    <link rel="icon" type="image/png" href="hoplun128.png">
    <link rel="shortcut icon" href="hoplun128.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        * { font-size: 11px; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 8px; }
        .table-container { max-height: calc(100vh - 200px); overflow: auto; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { border-collapse: collapse; width: 100%; }
        th { position: sticky; top: 0; background-color: #1e293b; color: white; z-index: 10; padding: 6px 4px; font-weight: 600; font-size: 10px; }
        td { padding: 4px 4px; border-bottom: 1px solid #e2e8f0; }
        .attendance-col { min-width: 90px; text-align: center; }
        .time-cell { font-family: monospace; font-size: 9px; white-space: pre-line; }
        .sticky-id { position: sticky; left: 0; background-color: white; z-index: 9; min-width: 70px; }
        .sticky-name { position: sticky; left: 70px; background-color: white; z-index: 9; min-width: 120px; }
        .filter-select { width: 100%; padding: 2px 2px; font-size: 9px; border: 1px solid #cbd5e1; border-radius: 4px; margin-top: 2px; background: white; }
        .btn-export { background: #059669; transition: 0.2s; }
        .btn-export:hover { background: #047857; }
        .btn-reset { background: #dc2626; }
        .btn-reset:hover { background: #b91c1c; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .rekap-box { background: #f1f5f9; border-radius: 6px; padding: 4px 8px; display: inline-block; margin-right: 8px; }
        .rekap-label { font-size: 9px; font-weight: bold; color: #334155; }
        .rekap-value { font-size: 12px; font-weight: bold; margin-left: 4px; }
    </style>
</head>
<body>

<div class="max-w-full mx-auto bg-white shadow-xl rounded-lg overflow-hidden">
    <!-- HEADER with Logo -->
    <div class="bg-slate-800 text-white p-2 flex justify-between items-center flex-wrap gap-2">
        <div class="flex items-center gap-2">
            <img src="hoplun128.png" alt="Hoplun" class="h-8 w-8 object-contain rounded-full bg-white p-0.5">
            <div>
                <h1 class="text-base font-bold tracking-wider">HOPLUN ATTENDANCE</h1>
                <p class="text-[9px] text-emerald-400">Dropdown Filter | Kehadiran Detail | Custom Range</p>
            </div>
        </div>
        <div class="flex items-center gap-1 bg-slate-700 p-1 rounded-lg flex-wrap">
            <div class="flex items-center gap-1 bg-slate-600 px-1 py-0.5 rounded">
                <label class="text-[9px] font-semibold">Header:</label>
                <input type="number" id="headerRow" value="6" class="w-8 px-0 py-0 text-black font-bold rounded text-[9px] text-center">
            </div>
            <label for="fileUpload" class="text-[9px] font-semibold cursor-pointer flex items-center gap-1 hover:text-blue-300 bg-slate-600 px-1.5 py-0.5 rounded">📁 .xlsb</label>
            <input type="file" id="fileUpload" class="hidden" multiple accept=".xlsb">
            <label for="timeUpload" class="text-[9px] font-semibold cursor-pointer flex items-center gap-1 hover:text-yellow-300 bg-slate-600 px-1.5 py-0.5 rounded">⏱️ Time</label>
            <input type="file" id="timeUpload" class="hidden" accept=".csv,.xlsx,.xls">
            <button id="resetDataBtn" class="bg-red-600 hover:bg-red-700 text-white px-1.5 py-0.5 rounded text-[9px]">Reset</button>
        </div>
    </div>

    <!-- REKAP & FILTER UTAMA -->
    <div class="p-2 bg-slate-50 border-b border-gray-200 flex flex-wrap items-center justify-between gap-2">
        <div class="flex flex-wrap gap-2 items-center">
            <div class="rekap-box">
                <span class="rekap-label">Total Worker:</span>
                <span id="totalWorker" class="rekap-value">0</span>
            </div>
            <div class="rekap-box">
                <span class="rekap-label">Total Staff:</span>
                <span id="totalStaff" class="rekap-value">0</span>
            </div>
            <div class="rekap-box">
                <span class="rekap-label">Total Security:</span>
                <span id="totalSecurity" class="rekap-value">0</span>
            </div>
            <div class="rekap-box">
                <span class="rekap-label">Total Semua:</span>
                <span id="totalSemua" class="rekap-value">0</span>
            </div>
        </div>
        <div class="flex gap-2 items-center">
            <div class="flex items-center gap-1 bg-white border rounded px-1 py-0.5">
                <span class="text-[9px] font-semibold">Tgl:</span>
                <select id="dateFrom" class="text-[9px] border-none bg-transparent"><option value="ALL">Dari</option></select>
                <span class="text-[9px]">-</span>
                <select id="dateTo" class="text-[9px] border-none bg-transparent"><option value="ALL">Sampai</option></select>
            </div>
            <select id="filterAttendanceDetail" class="bg-white border rounded px-1 py-0.5 text-[9px]">
                <option value="ALL">Semua Kehadiran</option>
                <option value="HADIR_KODE">Hadir (PR,PRP,PRS,PRM)</option>
                <option value="TIDAK_HADIR_KODE">Tidak Hadir (AB,LWP,AL,SK,ML,DL,OL)</option>
                <option value="NO_TIME_IN">Hadir - Tidak ada Time In</option>
                <option value="NO_TIME_OUT">Hadir - Tidak ada Time Out</option>
                <option value="NO_TIME_IN_OUT">Hadir - Tanpa Time In & Out</option>
            </select>
            <button id="btnExport" class="btn-export text-white font-bold py-0.5 px-2 rounded text-[9px]">Export XLSX</button>
            <button onclick="openSummary()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-0.5 px-2 rounded text-[9px]">Summary</button>
            <span id="dbStatus" class="text-[9px] font-semibold bg-blue-100 px-1 py-0.5 rounded">Kosong</span>
        </div>
    </div>

    <!-- TABEL dengan Filter per Kolom (Dropdown) -->
    <div class="table-container">
        <table id="attendanceTable">
            <thead id="tableHeader"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<!-- Modal Summary -->
<div id="summaryModal" class="hidden fixed inset-0 bg-black/60 z-40 items-center justify-center p-4"><div class="bg-white rounded-lg w-full max-w-4xl max-h-[85vh] flex flex-col"><div class="p-2 border-b bg-slate-800 text-white rounded-t-lg flex justify-between"><h2 class="text-sm font-bold">Summary (Data Terfilter)</h2><button onclick="closeSummary()" class="text-gray-300">✕</button></div><div class="p-2 overflow-auto" id="summaryContent"></div></div></div>
<div id="modernAlert" class="hidden fixed inset-0 bg-black/60 z-50 items-center justify-center"><div class="bg-white rounded-xl p-3 max-w-xs text-center"><div id="alertIcon"></div><h3 id="alertTitle" class="text-sm font-bold mb-1"></h3><p id="alertMessage" class="text-xs mb-3"></p><button onclick="closeAlert()" class="w-full bg-blue-600 text-white py-1 rounded text-xs">Mengerti</button></div></div>

<script>
    // ======================== GLOBAL ========================
    let databaseKaryawan = [];
    let timeMap = new Map();
    let semuaTanggal = [];
    let databaseGlobal = [];
    let selectedRange = { from: "ALL", to: "ALL" };
    let filterAttendanceDetail = "ALL";
    const MAX_CONCURRENT = 6;
    const MAX_BARIS_PER_FILE = 2500;

    // DOM
    const fileUpload = document.getElementById('fileUpload');
    const timeUpload = document.getElementById('timeUpload');
    const headerRowInput = document.getElementById('headerRow');
    const dateFrom = document.getElementById('dateFrom');
    const dateTo = document.getElementById('dateTo');
    const filterAttendanceDetailSelect = document.getElementById('filterAttendanceDetail');
    const btnExport = document.getElementById('btnExport');
    const resetDataBtn = document.getElementById('resetDataBtn');
    const tableHeader = document.getElementById('tableHeader');
    const tableBody = document.getElementById('tableBody');
    const dbStatus = document.getElementById('dbStatus');
    const totalWorkerSpan = document.getElementById('totalWorker');
    const totalStaffSpan = document.getElementById('totalStaff');
    const totalSecuritySpan = document.getElementById('totalSecurity');
    const totalSemuaSpan = document.getElementById('totalSemua');

    function showAlert(title, msg, type='info') {
        const modal = document.getElementById('modernAlert');
        document.getElementById('alertTitle').innerText = title;
        document.getElementById('alertMessage').innerText = msg;
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        setTimeout(() => { if(modal) modal.classList.add('hidden'); }, 2000);
    }
    function closeAlert() { document.getElementById('modernAlert').classList.add('hidden'); }
    function formatDateToString(d) {
        if(!d) return "";
        let date;
        if(d instanceof Date) date=d;
        else if(typeof d==='number') date=new Date((d-25569)*86400*1000);
        else date=new Date(d);
        if(isNaN(date.getTime())) return String(d);
        const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return `${String(date.getDate()).padStart(2,'0')}-${months[date.getMonth()]}-${date.getFullYear()}`;
    }
    function formatTimeRange(record) {
        if(!record) return "";
        const parts = record.split(';').map(p=>p.trim()).filter(p=>p);
        if(parts.length===0) return "";
        if(parts.length===1) return parts[0];
        return `${parts[0]}-${parts[parts.length-1]}`;
    }

    // ======================== BACA FILE .XLSB ========================
    async function bacaFileXLSB(file, forcedStatus) {
        return new Promise(async (resolve) => {
            try {
                const data = await readFileAsArrayBuffer(file);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                let sheetName = workbook.SheetNames.find(s => s.toUpperCase().includes('ATTEND')) || workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                let range = XLSX.utils.decode_range(worksheet['!ref'] || "A1:AK1000");
                if(range.e.r > MAX_BARIS_PER_FILE) range.e.r = MAX_BARIS_PER_FILE;
                const rawData = XLSX.utils.sheet_to_json(worksheet, { header:1, defval:"", blankrows:false, range: XLSX.utils.encode_range(range) });
                if(!rawData.length) { resolve(null); return; }
                // Deteksi header
                let headerRowIdx = -1, colMap = { id:-1, name:-1, section:-1, position:-1, join:-1 };
                for(let r=0; r<Math.min(rawData.length,15); r++) {
                    const row = rawData[r];
                    if(!row) continue;
                    let hasID=false, hasName=false;
                    for(let c=0;c<row.length;c++) {
                        let val = String(row[c]||"").toUpperCase().replace(/\s/g,'');
                        if(val.includes("NEWID")||val==="IDNO"||val==="ID") hasID=true;
                        if(val==="NAME"||val==="NAMA") hasName=true;
                    }
                    if(hasID && hasName) {
                        headerRowIdx = r;
                        for(let c=0;c<row.length;c++) {
                            let val = String(row[c]||"").toUpperCase().replace(/\s/g,'');
                            if(val.includes("NEWID")||val==="IDNO"||val==="ID") colMap.id = c;
                            else if(val==="NAME"||val==="NAMA") colMap.name = c;
                            else if(val.includes("SECT")) colMap.section = c;
                            else if(val.includes("POSITI")||val.includes("TITLE")) colMap.position = c;
                            else if(val.includes("JOIN")) colMap.join = c;
                        }
                        break;
                    }
                }
                if(headerRowIdx === -1) {
                    headerRowIdx = parseInt(headerRowInput.value)-1 || 5;
                    colMap = { id:0, name:1, section:2, position:3, join:4 };
                }
                const headerRow = rawData[headerRowIdx];
                const colTanggal = {};
                for(let c=0; c<headerRow.length; c++) {
                    let val = String(headerRow[c]||"").trim();
                    if(/^\d+$/.test(val)) colTanggal[val] = c;
                }
                const karyawanMap = new Map();
                for(let r=headerRowIdx+1; r<rawData.length; r++) {
                    const row = rawData[r];
                    if(!row) continue;
                    let id = String(row[colMap.id]||"").trim();
                    let name = String(row[colMap.name]||"").trim();
                    if(id==="" && name==="") continue;
                    const rowStr = JSON.stringify(row).toLowerCase();
                    if(rowStr.includes("hadir penuh")||rowStr.includes("mangkir")||rowStr.includes("sakit")||rowStr.includes("cuti tahunan")||rowStr.includes("cuti lain-lain")) continue;
                    const kodePerTanggal = {};
                    for(let [tgl, colIdx] of Object.entries(colTanggal)) {
                        let val = row[colIdx];
                        if(val !== undefined && val !== null && val !== "") kodePerTanggal[tgl] = String(val).trim();
                    }
                    const personal = {
                        id: id,
                        name: name,
                        section: String(row[colMap.section]||"").trim(),
                        position: String(row[colMap.position]||"").trim(),
                        joinDate: row[colMap.join] ? formatDateToString(row[colMap.join]) : "",
                        status: forcedStatus,
                        kodePerTanggal: kodePerTanggal
                    };
                    let key = id !== "" ? id.toUpperCase() : name.toUpperCase();
                    if(!karyawanMap.has(key)) karyawanMap.set(key, personal);
                }
                if(karyawanMap.size) resolve({ map: karyawanMap, fileName: file.name });
                else resolve(null);
            } catch(e) { console.error(e); resolve(null); }
        });
    }

    function isFileValid(file) { return file.name.toLowerCase().endsWith('.xlsb') && /WORKER|STAFF|SECURITY/i.test(file.name); }
    function getForcedStatus(fileName) { if(/STAFF/i.test(fileName)) return "STAFF"; if(/SECURITY/i.test(fileName)) return "SECURITY"; return "WORKER"; }

    async function prosesFileExcel(files) {
        if(!files.length) return;
        showAlert("Memproses", "Memuat file .xlsb...", "info");
        const valid = [];
        for(let f of files) if(isFileValid(f)) valid.push(f);
        if(!valid.length) { showAlert("Peringatan","Tidak ada file .xlsb valid","warning"); return; }
        const allResults = [];
        for(let i=0;i<valid.length;i+=MAX_CONCURRENT) {
            const batch = valid.slice(i,i+MAX_CONCURRENT);
            const promises = batch.map(f => bacaFileXLSB(f, getForcedStatus(f.name)));
            const res = await Promise.all(promises);
            allResults.push(...res);
        }
        const masterMap = new Map();
        for(const res of allResults) if(res && res.map.size) for(let [k,v] of res.map) if(!masterMap.has(k)) masterMap.set(k,v);
        if(!masterMap.size) { showAlert("Gagal","Tidak ada data karyawan","error"); return; }
        databaseKaryawan = Array.from(masterMap.values());
        semuaTanggal = [];
        for(let i=26;i<=31;i++) semuaTanggal.push(i);
        for(let i=1;i<=25;i++) semuaTanggal.push(i);
        localStorage.setItem('hoplun_karyawan', JSON.stringify(databaseKaryawan.map(k => ({ ...k, kodePerTanggal: k.kodePerTanggal }))));
        localStorage.setItem('hoplun_tanggal', JSON.stringify(semuaTanggal));
        gabungkanDanRender();
        showAlert("Sukses",`${databaseKaryawan.length} karyawan dimuat. Upload time clock.`,"success");
    }

    // ======================== BACA TIME CLOCK ========================
    async function loadTimeFile(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                if(!rows.length) { resolve(new Map()); return; }
                let idCol=-1, dateCol=-1, recordCol=-1;
                for(let i=0;i<Math.min(rows.length,20);i++) {
                    const row = rows[i];
                    for(let c=0;c<row.length;c++) {
                        let cell = String(row[c]||"").toUpperCase();
                        if(cell.includes("ID")) idCol = c;
                        if(cell.includes("DATE")) dateCol = c;
                        if(cell.includes("RECORD")) recordCol = c;
                    }
                    if(idCol!==-1 && dateCol!==-1 && recordCol!==-1) break;
                }
                if(idCol===-1 || dateCol===-1 || recordCol===-1) { resolve(new Map()); return; }
                const timeMapLocal = new Map();
                for(let r=1; r<rows.length; r++) {
                    const row = rows[r];
                    if(!row) continue;
                    let id = String(row[idCol]||"").trim();
                    let dateRaw = row[dateCol];
                    let dateStr = "";
                    if(dateRaw instanceof Date) dateStr = dateRaw.toISOString().slice(0,10);
                    else if(typeof dateRaw === 'number') dateStr = new Date((dateRaw-25569)*86400*1000).toISOString().slice(0,10);
                    else dateStr = String(dateRaw).trim();
                    let record = String(row[recordCol]||"").trim();
                    if(id && dateStr && record) {
                        let tgl = parseInt(dateStr.split('-')[2], 10);
                        if(!isNaN(tgl)) timeMapLocal.set(`${id}_${tgl}`, record);
                    }
                }
                resolve(timeMapLocal);
            };
            reader.onerror = () => resolve(new Map());
            reader.readAsArrayBuffer(file);
        });
    }

    // ======================== GABUNGKAN DATA ========================
    function gabungkanDanRender() {
        if(!databaseKaryawan.length) return;
        const finalData = databaseKaryawan.map(karyawan => {
            const tanggalData = {};
            for(let tgl of semuaTanggal) {
                const kode = karyawan.kodePerTanggal?.[String(tgl)] || "";
                const timeRaw = timeMap.get(`${karyawan.id}_${tgl}`);
                const timeFormatted = timeRaw ? formatTimeRange(timeRaw) : "";
                tanggalData[tgl] = { kode, time: timeFormatted };
            }
            return {
                id: karyawan.id,
                name: karyawan.name,
                section: karyawan.section,
                position: karyawan.position,
                joinDate: karyawan.joinDate,
                status: karyawan.status,
                tanggalData: tanggalData
            };
        });
        databaseGlobal = finalData;
        // Dropdown tanggal custom
        const optFrom = ['<option value="ALL">Dari</option>'];
        const optTo = ['<option value="ALL">Sampai</option>'];
        for(let t of semuaTanggal) {
            optFrom.push(`<option value="${t}">${t}</option>`);
            optTo.push(`<option value="${t}">${t}</option>`);
        }
        dateFrom.innerHTML = optFrom.join('');
        dateTo.innerHTML = optTo.join('');
        dateFrom.value = "ALL";
        dateTo.value = "ALL";
        selectedRange = { from: "ALL", to: "ALL" };
        renderTableWithFilters();
        dbStatus.innerHTML = `✅ Karyawan: ${databaseKaryawan.length} | Absen: ${timeMap.size}`;
    }

    // ======================== FILTER PER KOLOM (DROPDOWN) ========================
    function getTanggalRange() {
        let from = dateFrom.value;
        let to = dateTo.value;
        if(from === "ALL" || to === "ALL") return semuaTanggal;
        let fromIdx = semuaTanggal.indexOf(parseInt(from));
        let toIdx = semuaTanggal.indexOf(parseInt(to));
        if(fromIdx === -1 || toIdx === -1) return semuaTanggal;
        if(fromIdx <= toIdx) return semuaTanggal.slice(fromIdx, toIdx+1);
        else return [...semuaTanggal.slice(fromIdx), ...semuaTanggal.slice(0, toIdx+1)];
    }

    // Mendapatkan data yang sudah difilter oleh semua dropdown per kolom
    function getFilteredData() {
        if(!databaseGlobal.length) return [];
        let filtered = [...databaseGlobal];
        const idFilter = document.getElementById('filter_id')?.value || "";
        const nameFilter = document.getElementById('filter_name')?.value || "";
        const sectionFilter = document.getElementById('filter_section')?.value || "";
        const positionFilter = document.getElementById('filter_position')?.value || "";
        const statusFilter = document.getElementById('filter_status')?.value || "";
        if(idFilter && idFilter !== "ALL") filtered = filtered.filter(r => r.id === idFilter);
        if(nameFilter && nameFilter !== "ALL") filtered = filtered.filter(r => r.name === nameFilter);
        if(sectionFilter && sectionFilter !== "ALL") filtered = filtered.filter(r => r.section === sectionFilter);
        if(positionFilter && positionFilter !== "ALL") filtered = filtered.filter(r => r.position === positionFilter);
        if(statusFilter && statusFilter !== "ALL") filtered = filtered.filter(r => r.status === statusFilter);
        return filtered;
    }

    // Filter kehadiran detail (Hadir: PR,PRP,PRS,PRM ; Tidak Hadir: AB,LWP,AL,SK,ML,DL,OL)
    function applyAttendanceDetailFilter(data, range) {
        const mode = filterAttendanceDetailSelect.value;
        if(mode === "ALL") return data;
        const hadirKodes = ['PR', 'PRP', 'PRS', 'PRM'];
        const tidakHadirKodes = ['AB', 'LWP', 'AL', 'SK', 'ML', 'DL', 'OL'];
        return data.filter(row => {
            for(let tgl of range) {
                const item = row.tanggalData[tgl] || { kode: "", time: "" };
                const kode = item.kode.toUpperCase();
                const time = item.time;
                if(mode === "HADIR_KODE" && hadirKodes.includes(kode)) return true;
                if(mode === "TIDAK_HADIR_KODE" && tidakHadirKodes.includes(kode)) return true;
                if(mode === "NO_TIME_IN" && hadirKodes.includes(kode) && (!time || !time.includes('-'))) return true;
                if(mode === "NO_TIME_OUT" && hadirKodes.includes(kode) && time && time.includes('-') && time.split('-')[1] === "") return true;
                if(mode === "NO_TIME_IN_OUT" && hadirKodes.includes(kode) && !time) return true;
            }
            return false;
        });
    }

    // Update rekap berdasarkan data yang sedang difilter (sebelum filter kehadiran & tanggal)
    function updateRekap(filteredData) {
        let worker = 0, staff = 0, security = 0;
        for(let row of filteredData) {
            if(row.status === "WORKER") worker++;
            else if(row.status === "STAFF") staff++;
            else if(row.status === "SECURITY") security++;
        }
        totalWorkerSpan.innerText = worker;
        totalStaffSpan.innerText = staff;
        totalSecuritySpan.innerText = security;
        totalSemuaSpan.innerText = filteredData.length;
    }

    // Render tabel dengan semua filter (termasuk dropdown per kolom)
    function renderTableWithFilters() {
        if(!databaseGlobal.length) {
            tableHeader.innerHTML = ''; tableBody.innerHTML = '<tr><td colspan="6" class="p-4 text-center">Belum ada数据</td></tr>';
            updateRekap([]);
            return;
        }
        let filteredData = getFilteredData();
        updateRekap(filteredData); // rekap berdasarkan data sebelum filter tanggal & kehadiran
        const range = getTanggalRange();
        filteredData = applyAttendanceDetailFilter(filteredData, range);
        // Siapkan kolom tetap dan tanggal
        const fixedCols = [
            { name: "ID", width: 70, filterKey: "id" },
            { name: "NAMA", width: 120, filterKey: "name" },
            { name: "SECTION", width: 100, filterKey: "section" },
            { name: "POSISI", width: 100, filterKey: "position" },
            { name: "JOIN DATE", width: 85, filterKey: null },
            { name: "STATUS", width: 75, filterKey: "status" }
        ];
        const tanggalCols = range.map(t => ({ name: `Tgl ${t}`, width: 90, filterKey: null }));
        const allCols = [...fixedCols, ...tanggalCols];
        // Buat header row (nama kolom)
        let th = `<tr class="bg-slate-800 text-white text-[10px]">`;
        for(let i=0; i<allCols.length; i++) {
            let col = allCols[i];
            let cls = "px-1 py-1 border-r";
            if(i===0) cls += " sticky left-0 z-20 bg-slate-800";
            if(i===1) cls += " sticky left-[70px] z-20 bg-slate-800";
            th += `<th style="min-width:${col.width}px" class="${cls}">${col.name}</th>`;
        }
        th += `<tr>`;
        // Baris filter dropdown
        th += `<tr class="bg-gray-200 text-[9px]">`;
        for(let i=0; i<allCols.length; i++) {
            let col = allCols[i];
            if(col.filterKey) {
                // Ambil nilai unik dari databaseGlobal untuk kolom tersebut
                let uniqueValues = [...new Set(databaseGlobal.map(r => r[col.filterKey]).filter(v => v && v !== ""))].sort();
                let options = `<option value="ALL">Semua</option>`;
                for(let val of uniqueValues) {
                    options += `<option value="${val.replace(/"/g, '&quot;')}">${val}</option>`;
                }
                th += `<th class="px-1 py-0.5"><select id="filter_${col.filterKey}" class="filter-select" style="width:${col.width-8}px">${options}</select></th>`;
            } else {
                th += `<th class="px-1 py-0.5"></th>`;
            }
        }
        th += `</tr>`;
        tableHeader.innerHTML = th;
        // Pasang event listener untuk setiap dropdown
        for(let col of fixedCols) {
            if(col.filterKey) {
                const sel = document.getElementById(`filter_${col.filterKey}`);
                if(sel) sel.addEventListener('change', () => renderTableWithFilters());
            }
        }
        // Body tabel
        let tb = "";
        const max = Math.min(filteredData.length, 2000);
        for(let row of filteredData.slice(0,max)) {
            tb += `<tr class="hover:bg-blue-50 border-b">`;
            // Kolom tetap
            const fixedVals = [row.id, row.name, row.section, row.position, row.joinDate, row.status];
            for(let i=0; i<fixedVals.length; i++) {
                let val = fixedVals[i];
                let extra = "px-1 py-0.5";
                let style = "";
                if(i===0) { extra = "sticky-id font-medium px-1"; style = "background:white; min-width:70px;"; }
                if(i===1) { extra = "sticky-name px-1"; style = "background:white; min-width:120px;"; }
                if(i===5) {
                    if(val==="WORKER") val='<span class="bg-emerald-100 px-1 rounded">WORKER</span>';
                    else if(val==="STAFF") val='<span class="bg-purple-100 px-1 rounded">STAFF</span>';
                    else if(val==="SECURITY") val='<span class="bg-slate-700 text-white px-1 rounded">SECURITY</span>';
                }
                tb += `<td class="${extra}" style="${style}">${val}</td>`;
            }
            // Kolom tanggal
            for(let tgl of range) {
                const dataTgl = row.tanggalData[tgl] || { kode: "", time: "" };
                let kode = dataTgl.kode;
                let time = dataTgl.time;
                let display = "";
                if(kode && time) display = `${kode}|${time}`;
                else if(kode) display = kode;
                else if(time) display = time;
                else display = "—";
                if(kode && !time) display = `<span class="text-orange-500">${display}</span>`;
                else if(time) display = `<span class="text-green-600">${display}</span>`;
                tb += `<td class="attendance-col px-1 py-0.5 text-center time-cell">${display}</td>`;
            }
            tb += `</tr>`;
        }
        if(filteredData.length > 2000) tb += `<tr><td colspan="${allCols.length}" class="p-1 text-center text-blue-500 text-[9px]">Hanya 2000 baris pertama</td></tr>`;
        tableBody.innerHTML = tb;
    }

    // Summary berdasarkan data terfilter (sama seperti filter yang dipakai)
    function openSummary() {
        let filteredData = getFilteredData();
        const range = getTanggalRange();
        filteredData = applyAttendanceDetailFilter(filteredData, range);
        if(!filteredData.length) { showAlert("Info","Tidak ada data untuk ditampilkan","info"); return; }
        const summary = new Map();
        let gw=0,gs=0,gsec=0;
        for(const row of filteredData) {
            let pos = row.position || "UNKNOWN";
            let stat = row.status;
            if(!summary.has(pos)) summary.set(pos,{WORKER:0,STAFF:0,SECURITY:0,TOTAL:0});
            const d = summary.get(pos);
            if(stat==="WORKER") { d.WORKER++; gw++; }
            else if(stat==="STAFF") { d.STAFF++; gs++; }
            else if(stat==="SECURITY") { d.SECURITY++; gsec++; }
            d.TOTAL++;
        }
        let html = `<table class="w-full border text-[9px]"><thead><tr class="bg-slate-700 text-white"><th class="p-1">POSISI</th><th>WORKER</th><th>STAFF</th><th>SECURITY</th><th>TOTAL</th></tr></thead><tbody>`;
        for(let [pos,data] of [...summary.entries()].sort()) {
            html += `<tr><td class="border p-1">${pos}</td><td class="border p-1 text-center">${data.WORKER}</td><td class="border p-1 text-center">${data.STAFF}</td><td class="border p-1 text-center">${data.SECURITY}</td><td class="border p-1 text-center font-bold">${data.TOTAL}</td></tr>`;
        }
        html += `<tr class="bg-indigo-100 font-bold"><td class="p-1">GRAND TOTAL</td><td class="text-center">${gw}</td><td class="text-center">${gs}</td><td class="text-center">${gsec}</td><td class="text-center">${gw+gs+gsec}</td></tr></tbody>`;
        document.getElementById('summaryContent').innerHTML = html;
        document.getElementById('summaryModal').classList.remove('hidden');
        document.getElementById('summaryModal').classList.add('flex');
    }
    function closeSummary() { document.getElementById('summaryModal').classList.add('hidden'); }

    // Export ke Excel berdasarkan data terfilter
    function exportToExcel() {
        let filteredData = getFilteredData();
        const range = getTanggalRange();
        filteredData = applyAttendanceDetailFilter(filteredData, range);
        if(!filteredData.length) { showAlert("Tidak ada data","","warning"); return; }
        const fixedCols = ["ID", "NAMA", "SECTION", "POSISI", "JOIN DATE", "STATUS"];
        const tanggalCols = range.map(t => `Tgl ${t}`);
        const headers = [...fixedCols, ...tanggalCols];
        const wsData = [headers];
        for(const row of filteredData) {
            const rowArr = [row.id, row.name, row.section, row.position, row.joinDate, row.status];
            for(let tgl of range) {
                const dataTgl = row.tanggalData[tgl] || { kode: "", time: "" };
                let kode = dataTgl.kode;
                let time = dataTgl.time;
                let display = "";
                if(kode && time) display = `${kode}|${time}`;
                else if(kode) display = kode;
                else if(time) display = time;
                else display = "";
                rowArr.push(display);
            }
            wsData.push(rowArr);
        }
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Attendance");
        XLSX.writeFile(wb, `hoplun_attendance_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.xlsx`);
        showAlert("Berhasil","Data diekspor","success");
    }

    // ======================== EVENT LISTENERS ========================
    function readFileAsArrayBuffer(file) {
        return new Promise((resolve,reject)=>{ const fr=new FileReader(); fr.onload=e=>resolve(e.target.result); fr.onerror=()=>reject(); fr.readAsArrayBuffer(file); });
    }
    fileUpload.addEventListener('change', (e) => { if(e.target.files.length) prosesFileExcel(Array.from(e.target.files)); });
    timeUpload.addEventListener('change', async (e) => {
        if(!e.target.files.length) return;
        const file = e.target.files[0];
        const newTimeMap = await loadTimeFile(file);
        if(newTimeMap.size) {
            timeMap = newTimeMap;
            localStorage.setItem('hoplun_time', JSON.stringify(Object.fromEntries(timeMap)));
            if(databaseKaryawan.length) gabungkanDanRender();
            else showAlert("Info","Data time tersimpan. Upload .xlsb dulu.","info");
        } else { showAlert("Gagal","Tidak ada data time valid","error"); }
        e.target.value = "";
    });
    dateFrom.addEventListener('change', () => renderTableWithFilters());
    dateTo.addEventListener('change', () => renderTableWithFilters());
    filterAttendanceDetailSelect.addEventListener('change', () => renderTableWithFilters());
    btnExport.addEventListener('click', exportToExcel);
    resetDataBtn.addEventListener('click', () => {
        if(confirm("Hapus semua data?")) { localStorage.clear(); databaseKaryawan=[]; timeMap.clear(); databaseGlobal=[]; renderTableWithFilters(); dbStatus.innerHTML="Kosong"; showAlert("Reset","Data dihapus","success"); }
    });
    // Load dari localStorage
    (function loadStored() {
        const karyawan = localStorage.getItem('hoplun_karyawan');
        const tanggal = localStorage.getItem('hoplun_tanggal');
        const timeObj = localStorage.getItem('hoplun_time');
        if(karyawan && tanggal) {
            databaseKaryawan = JSON.parse(karyawan);
            semuaTanggal = JSON.parse(tanggal);
            if(timeObj) timeMap = new Map(Object.entries(JSON.parse(timeObj)));
            if(databaseKaryawan.length) gabungkanDanRender();
        }
    })();
</script>
