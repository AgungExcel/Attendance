<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIO - Attendance Dashboard (Debug + Fallback)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .table-container { max-height: 55vh; overflow: auto; }
        th { position: sticky; top: 0; background-color: #1e293b; color: white; z-index: 10; }
        .attendance-col { min-width: 100px; text-align: center; }
        .time-cell { font-family: monospace; font-size: 10px; }
        .btn-export { background: #059669; }
        .btn-export:hover { background: #047857; }
        .btn-reset { background: #dc2626; }
        .btn-reset:hover { background: #b91c1c; }
    </style>
</head>
<body class="p-4 text-sm">

<div class="max-w-7xl mx-auto bg-white shadow-xl rounded-lg overflow-hidden border border-gray-200">
    <div class="bg-slate-800 text-white p-4 flex justify-between items-center flex-wrap gap-3">
        <div>
            <h1 class="text-xl font-bold tracking-wider">ATTENDANCE DASHBOARD</h1>
            <p class="text-xs text-emerald-400 mt-1">🔍 Mode Debug | Lihat log untuk struktur file</p>
        </div>
        <div class="flex items-center gap-3 bg-slate-700 p-2 rounded-lg flex-wrap">
            <div class="flex items-center gap-2 bg-slate-600 px-2 py-1 rounded">
                <label class="text-xs font-semibold">Header Baris:</label>
                <input type="number" id="headerRow" value="6" class="w-12 px-1 py-1 text-black font-bold rounded text-xs text-center">
            </div>
            <label for="fileUpload" class="text-xs font-semibold cursor-pointer flex items-center gap-2 hover:text-blue-300">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                1. Upload .xlsb
            </label>
            <input type="file" id="fileUpload" class="hidden" multiple accept=".xlsb">
            <label for="timeUpload" class="text-xs font-semibold cursor-pointer flex items-center gap-2 hover:text-yellow-300 bg-slate-600 px-2 py-1 rounded">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                2. Upload Time Clock
            </label>
            <input type="file" id="timeUpload" class="hidden" accept=".csv,.xlsx,.xls">
            <button id="resetDataBtn" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded text-xs">Reset Data</button>
        </div>
    </div>

    <div class="p-4 bg-slate-50 border-b border-gray-200 grid grid-cols-1 md:grid-cols-12 gap-4 relative">
        <div id="loadingOverlay" class="absolute inset-0 bg-white/95 z-20 hidden flex-col items-center justify-center backdrop-blur-sm">
            <div class="relative w-20 h-20 mb-4"><div class="absolute inset-0 rounded-full border-t-4 border-blue-600 animate-spin"></div></div>
            <h2 class="text-2xl font-extrabold text-slate-800">Memproses Data</h2>
            <p class="text-base font-bold text-blue-600 mt-2" id="loadingSubText"></p>
            <div class="mt-4 w-full max-w-2xl bg-slate-900 rounded-lg p-3"><ul id="loadingLog" class="text-xs text-green-400 font-mono h-32 overflow-y-auto"></ul></div>
        </div>

        <div class="md:col-span-9 flex flex-col gap-2">
            <div class="bg-yellow-100 p-2 rounded text-center text-xs font-bold">Kosongkan kolom kuning untuk menampilkan semua data</div>
            <div class="flex gap-2"><input type="text" id="searchInput" placeholder="Nama / ID" class="w-full bg-yellow-200 border border-yellow-400 px-4 py-2 rounded"><button id="btnSearch" class="bg-white px-6 rounded border">Cari</button></div>
            <div class="flex flex-wrap gap-2">
                <select id="filterStatus" class="bg-white border rounded px-3 py-2 text-xs"><option value="ALL">Semua Status</option><option value="WORKER">WORKER</option><option value="STAFF">STAFF</option><option value="SECURITY">SECURITY</option></select>
                <select id="filterSection" class="bg-white border rounded px-3 py-2 text-xs"><option value="ALL">Semua Section</option></select>
                <select id="filterPosition" class="bg-white border rounded px-3 py-2 text-xs"><option value="ALL">Semua Posisi</option></select>
                <select id="filterTanggal" class="bg-white border rounded px-3 py-2 text-xs"><option value="ALL">Semua Tanggal</option></select>
            </div>
        </div>
        <div class="md:col-span-3 flex flex-col gap-2">
            <div class="grid grid-cols-2 gap-2 text-center">
                <div class="bg-green-100 p-2 rounded"><div class="text-[10px] font-bold">Total Ditampilkan</div><div class="text-xl font-black" id="totalDataCount">0</div></div>
                <div class="bg-blue-100 p-2 rounded"><div class="text-[10px] font-bold">Status DB</div><span id="dbStatus" class="inline-block px-2 py-1 rounded-full text-[9px] font-semibold bg-red-100">Belum ada Data</span></div>
            </div>
            <div class="flex gap-2">
                <button onclick="openSummary()" class="w-1/2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded text-xs">Summary</button>
                <button id="btnExport" class="w-1/2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded text-xs">Export XLSX</button>
            </div>
        </div>
    </div>

    <div class="table-container bg-white relative">
        <table class="w-full text-left border-collapse whitespace-nowrap">
            <thead id="tableHeader"></thead>
            <tbody id="tableBody"><tr><td colspan="6" class="p-10 text-center text-gray-500">Upload file .xlsb (lihat log untuk detail)</td></tr></tbody>
        </table>
    </div>

    <div id="summaryModal" class="hidden fixed inset-0 bg-black/60 z-40 items-center justify-center p-4"><div class="bg-white rounded-lg shadow-2xl w-full max-w-4xl max-h-[85vh] flex flex-col"><div class="p-4 border-b bg-slate-800 text-white rounded-t-lg flex justify-between"><h2 class="text-lg font-bold">Summary per Posisi & Status</h2><button onclick="closeSummary()" class="text-gray-300">&times;</button></div><div class="p-4 overflow-auto" id="summaryContent"></div></div></div>
    <div id="modernAlert" class="hidden fixed inset-0 bg-black/60 z-50 items-center justify-center"><div class="bg-white rounded-2xl p-6 max-w-sm text-center"><div id="alertIcon"></div><h3 id="alertTitle" class="text-xl font-bold mb-2"></h3><p id="alertMessage" class="text-sm mb-6"></p><button onclick="closeAlert()" class="w-full bg-blue-600 text-white py-2 rounded-xl">Mengerti</button></div></div>
</div>

<script>
    // ======================== GLOBAL ========================
    let databaseKaryawan = [];
    let timeMap = new Map();
    let tanggalList = [];
    let currentHeaders = [];
    let databaseGlobal = [];
    let selectedTanggal = "ALL";
    const MAX_CONCURRENT = 2; // kecilkan untuk debugging

    const fileUpload = document.getElementById('fileUpload');
    const timeUpload = document.getElementById('timeUpload');
    const headerRowInput = document.getElementById('headerRow');
    const searchInput = document.getElementById('searchInput');
    const btnSearch = document.getElementById('btnSearch');
    const filterStatus = document.getElementById('filterStatus');
    const filterSection = document.getElementById('filterSection');
    const filterPosition = document.getElementById('filterPosition');
    const filterTanggal = document.getElementById('filterTanggal');
    const btnExport = document.getElementById('btnExport');
    const resetDataBtn = document.getElementById('resetDataBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingSubText = document.getElementById('loadingSubText');
    const loadingLog = document.getElementById('loadingLog');
    const tableHeader = document.getElementById('tableHeader');
    const tableBody = document.getElementById('tableBody');
    const totalDataCount = document.getElementById('totalDataCount');
    const dbStatus = document.getElementById('dbStatus');

    function addLog(msg, type="info") {
        if(!loadingLog) return;
        const li = document.createElement('li');
        li.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        li.className = type==="error"?"text-red-400":type==="success"?"text-emerald-400":type==="warning"?"text-yellow-400":"text-green-400";
        loadingLog.appendChild(li);
        loadingLog.scrollTop = loadingLog.scrollHeight;
    }
    function showAlert(title, msg, type='info') { /* sama seperti sebelumnya */ 
        const modal = document.getElementById('modernAlert');
        document.getElementById('alertTitle').innerText = title;
        document.getElementById('alertMessage').innerText = msg;
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }
    function closeAlert() { document.getElementById('modernAlert').classList.add('hidden'); }

    // ======================== BACA FILE .XLSB DENGAN DEBUG ========================
    async function bacaFileXLSB(file, forcedStatus) {
        return new Promise(async (resolve) => {
            try {
                addLog(`📄 Membaca file: ${file.name}`, "info");
                const data = await readFileAsArrayBuffer(file);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                
                // Cari sheet: prioritaskan yang mengandung "ATTEND", jika tidak ada pakai sheet pertama
                let sheetName = workbook.SheetNames.find(s => s.toUpperCase().includes('ATTEND'));
                if (!sheetName) {
                    sheetName = workbook.SheetNames[0];
                    addLog(`⚠️ Sheet "ATTEND" tidak ditemukan, menggunakan sheet pertama: "${sheetName}"`, "warning");
                }
                const worksheet = workbook.Sheets[sheetName];
                
                // Konversi ke array tanpa batasan baris dulu (untuk debugging)
                const rawData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "", blankrows: false });
                if (!rawData.length) {
                    addLog(`❌ File ${file.name} tidak memiliki data`, "error");
                    resolve(null);
                    return;
                }
                
                // TAMPILKAN 5 BARIS PERTAMA KE LOG (untuk debugging)
                addLog(`🔍 5 baris pertama file ${file.name}:`, "info");
                for (let i = 0; i < Math.min(5, rawData.length); i++) {
                    addLog(`   Baris ${i+1}: ${JSON.stringify(rawData[i]).substring(0, 200)}`, "info");
                }
                
                // Dapatkan baris header dari input user (default 6, berarti index ke-5)
                let headerRowIndex = parseInt(headerRowInput.value) - 1;
                if (isNaN(headerRowIndex)) headerRowIndex = 5;
                
                // Coba deteksi otomatis apakah baris header mengandung ID dan NAME
                let detectedHeaderRow = -1;
                for (let r = 0; r < Math.min(rawData.length, 20); r++) {
                    const row = rawData[r];
                    if (!row) continue;
                    let hasID = false, hasName = false;
                    for (let c = 0; c < row.length; c++) {
                        let cell = String(row[c] || "").toUpperCase().replace(/\s/g, '');
                        if (cell.includes("NEWID") || cell === "IDNO" || cell === "ID") hasID = true;
                        if (cell === "NAME" || cell === "NAMA") hasName = true;
                    }
                    if (hasID && hasName) {
                        detectedHeaderRow = r;
                        addLog(`✅ Deteksi otomatis: header ditemukan pada baris ke-${r+1}`, "success");
                        break;
                    }
                }
                
                // Gunakan hasil deteksi jika ada,否则 gunakan headerRow dari user
                const effectiveHeaderRow = (detectedHeaderRow !== -1) ? detectedHeaderRow : headerRowIndex;
                addLog(`📌 Menggunakan baris header ke-${effectiveHeaderRow+1}`, "info");
                
                if (effectiveHeaderRow >= rawData.length) {
                    addLog(`❌ Baris header melebihi jumlah baris data (${rawData.length})`, "error");
                    resolve(null);
                    return;
                }
                
                const headerRow = rawData[effectiveHeaderRow];
                // Buat mapping kolom berdasarkan posisi (asumsi urutan: kolom 0 = New ID No, 1 = NAME, 2 = SECTION, 3 = POSITION, 4 = JOIN DATE)
                // Tapi lebih baik cari berdasarkan isi header
                let colIdx = {
                    "New ID No": -1,
                    "NAME": -1,
                    "SECTION": -1,
                    "NEW POSITION / TITLE": -1,
                    "JOIN DATE": -1
                };
                for (let c = 0; c < headerRow.length; c++) {
                    let cell = String(headerRow[c] || "").toUpperCase().replace(/\s/g, '');
                    if (cell.includes("NEWID") || cell === "IDNO" || cell === "ID") colIdx["New ID No"] = c;
                    if (cell === "NAME" || cell === "NAMA") colIdx["NAME"] = c;
                    if (cell.includes("SECT")) colIdx["SECTION"] = c;
                    if (cell.includes("POSITI") || cell.includes("TITLE")) colIdx["NEW POSITION / TITLE"] = c;
                    if (cell.includes("JOIN")) colIdx["JOIN DATE"] = c;
                }
                // Jika masih ada yang -1, gunakan urutan default: 0,1,2,3,4
                if (colIdx["New ID No"] === -1) colIdx["New ID No"] = 0;
                if (colIdx["NAME"] === -1) colIdx["NAME"] = 1;
                if (colIdx["SECTION"] === -1) colIdx["SECTION"] = 2;
                if (colIdx["NEW POSITION / TITLE"] === -1) colIdx["NEW POSITION / TITLE"] = 3;
                if (colIdx["JOIN DATE"] === -1) colIdx["JOIN DATE"] = 4;
                
                addLog(`📊 Mapping kolom: ID=${colIdx["New ID No"]}, Nama=${colIdx["NAME"]}, Section=${colIdx["SECTION"]}, Posisi=${colIdx["NEW POSITION / TITLE"]}, Join=${colIdx["JOIN DATE"]}`, "info");
                
                // Sekarang baca baris data mulai dari effectiveHeaderRow+1
                const karyawanMap = new Map();
                let rowCount = 0;
                for (let r = effectiveHeaderRow+1; r < rawData.length; r++) {
                    const row = rawData[r];
                    if (!row || row.length === 0) continue;
                    let id = String(row[colIdx["New ID No"]] || "").trim();
                    let name = String(row[colIdx["NAME"]] || "").trim();
                    if (id === "" && name === "") continue;
                    
                    // Skip baris yang mengandung kata footer (case insensitive)
                    const rowStr = JSON.stringify(row).toLowerCase();
                    if (rowStr.includes("hadir penuh") || rowStr.includes("mangkir") || rowStr.includes("sakit") || 
                        rowStr.includes("cuti tahunan") || rowStr.includes("cuti lain-lain")) {
                        addLog(`   Melewati baris footer: ${name || id}`, "warning");
                        continue;
                    }
                    
                    const personal = {
                        "New ID No": id,
                        "NAME": name,
                        "SECTION": String(row[colIdx["SECTION"]] || "").trim(),
                        "NEW POSITION / TITLE": String(row[colIdx["NEW POSITION / TITLE"]] || "").trim(),
                        "JOIN DATE": (row[colIdx["JOIN DATE"]] ? formatDateToString(row[colIdx["JOIN DATE"]]) : ""),
                        "STATUS": forcedStatus
                    };
                    
                    // Cari kolom tanggal (angka 1-31, 26-31) – kita cari dari baris header
                    // Untuk sementara kita tidak mengambil nilai tanggal dari file .xlsb dulu, nanti akan diisi oleh time clock
                    // Tapi jika diperlukan, kita bisa cari kolom yang namanya angka
                    for (let c = 0; c < headerRow.length; c++) {
                        let colName = String(headerRow[c] || "").trim();
                        if (/^\d+$/.test(colName)) {
                            let tgl = colName;
                            let val = row[c];
                            if (val !== undefined && val !== null && val !== "") {
                                personal[tgl] = String(val).trim();
                            }
                        }
                    }
                    
                    let key = id !== "" ? id.toUpperCase() : name.toUpperCase();
                    if (!karyawanMap.has(key)) {
                        karyawanMap.set(key, personal);
                        rowCount++;
                    }
                }
                addLog(`✅ ${file.name}: berhasil mengambil ${rowCount} data karyawan`, "success");
                if (rowCount === 0) {
                    addLog(`⚠️ Tidak ada data valid di file ${file.name}. Periksa baris header atau isi data.`, "error");
                    resolve(null);
                } else {
                    resolve({ map: karyawanMap, fileName: file.name });
                }
            } catch (err) {
                addLog(`❌ Error membaca ${file.name}: ${err.message}`, "error");
                resolve(null);
            }
        });
    }

    function formatDateToString(d) {
        if (!d) return "";
        let date;
        if (d instanceof Date) date = d;
        else if (typeof d === 'number') date = new Date((d - 25569) * 86400 * 1000);
        else date = new Date(d);
        if (isNaN(date.getTime())) return String(d);
        const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return `${String(date.getDate()).padStart(2,'0')}-${months[date.getMonth()]}-${date.getFullYear()}`;
    }

    function readFileAsArrayBuffer(file) {
        return new Promise((resolve, reject) => {
            const fr = new FileReader();
            fr.onload = e => resolve(e.target.result);
            fr.onerror = () => reject(new Error("Gagal membaca file"));
            fr.readAsArrayBuffer(file);
        });
    }

    function isFileValid(file) {
        return file.name.toLowerCase().endsWith('.xlsb') && /WORKER|STAFF|SECURITY/i.test(file.name);
    }
    function getForcedStatus(fileName) {
        if (/STAFF/i.test(fileName)) return "STAFF";
        if (/SECURITY/i.test(fileName)) return "SECURITY";
        return "WORKER";
    }

    async function prosesFileExcel(files) {
        if (!files.length) return;
        loadingOverlay.classList.remove('hidden');
        loadingOverlay.classList.add('flex');
        loadingLog.innerHTML = '<li>[SISTEM] Memulai proses upload .xlsb...</li>';
        const validFiles = [];
        for (let f of files) if (isFileValid(f)) validFiles.push(f);
        if (validFiles.length === 0) {
            showAlert("Peringatan", "Tidak ada file .xlsb valid (nama harus mengandung WORKER/STAFF/SECURITY)", "warning");
            loadingOverlay.classList.add('hidden');
            return;
        }
        loadingSubText.innerText = `Memproses ${validFiles.length} file .xlsb...`;
        const allResults = [];
        for (let i = 0; i < validFiles.length; i += MAX_CONCURRENT) {
            const batch = validFiles.slice(i, i+MAX_CONCURRENT);
            const promises = batch.map(f => bacaFileXLSB(f, getForcedStatus(f.name)));
            const batchResults = await Promise.all(promises);
            allResults.push(...batchResults);
            loadingSubText.innerText = `Proses ${Math.min(i+MAX_CONCURRENT, validFiles.length)}/${validFiles.length} file...`;
        }
        const masterMap = new Map();
        const berhasilFiles = [];
        for (const res of allResults) {
            if (res && res.map.size) {
                for (let [k, v] of res.map) if (!masterMap.has(k)) masterMap.set(k, v);
                berhasilFiles.push(res.fileName);
            }
        }
        if (masterMap.size === 0) {
            showAlert("Gagal", "Tidak ada data karyawan yang berhasil diekstrak. Periksa log untuk detail.", "error");
            loadingOverlay.classList.add('hidden');
            return;
        }
        databaseKaryawan = Array.from(masterMap.values());
        // Tentukan tanggalList (26-31,1-25)
        tanggalList = [];
        for (let i = 26; i <= 31; i++) tanggalList.push(String(i));
        for (let i = 1; i <= 25; i++) tanggalList.push(String(i));
        // Simpan ke localStorage
        localStorage.setItem('attendance_karyawan', JSON.stringify(databaseKaryawan));
        localStorage.setItem('attendance_tanggalList', JSON.stringify(tanggalList));
        gabungkanDanRender();
        loadingOverlay.classList.add('hidden');
        showAlert("Sukses", `${databaseKaryawan.length} karyawan berhasil dimuat. Lihat tabel dan log untuk detail.`, "success");
    }

    function gabungkanDanRender() {
        if (!databaseKaryawan.length) return;
        const finalData = databaseKaryawan.map(karyawan => {
            const row = { ...karyawan };
            for (let tgl of tanggalList) {
                const timeKey = `${karyawan["New ID No"]}_${tgl}`;
                const timeRecord = timeMap.get(timeKey);
                if (timeRecord) {
                    // Format waktu: ambil pertama dan terakhir
                    const parts = timeRecord.split(';').map(p=>p.trim()).filter(p=>p);
                    row[tgl] = parts.length ? (parts.length===1 ? parts[0] : `${parts[0]}-${parts[parts.length-1]}`) : "";
                } else {
                    row[tgl] = karyawan[tgl] || "";
                }
            }
            return row;
        });
        databaseGlobal = finalData;
        // Update dropdown tanggal
        const opt = ['<option value="ALL">Semua Tanggal</option>'];
        for (let t of tanggalList) opt.push(`<option value="${t}">Tanggal ${t}</option>`);
        filterTanggal.innerHTML = opt.join('');
        updateDynamicFilters();
        jalankanPencarian();
        dbStatus.innerHTML = `✅ Karyawan: ${databaseKaryawan.length} | Absen: ${timeMap.size}`;
        dbStatus.className = "inline-block px-2 py-1 rounded-full text-[9px] font-semibold bg-green-100 text-green-800";
    }

    // ======================== SISANYA (filter, summary, export) SAMA ========================
    function updateDynamicFilters() { /* sama seperti sebelumnya */ 
        if(!databaseGlobal.length) return;
        const currentStatus = filterStatus.value;
        let filtered = databaseGlobal;
        if(currentStatus !== "ALL") filtered = filtered.filter(r=>r["STATUS"]===currentStatus);
        const sections = [...new Set(filtered.map(r=>r["SECTION"]).filter(x=>x))].sort();
        filterSection.innerHTML = '<option value="ALL">Semua Section</option>' + sections.map(s=>`<option value="${s}">${s}</option>`).join('');
        const currentSection = filterSection.value;
        let filtered2 = filtered;
        if(currentSection !== "ALL") filtered2 = filtered2.filter(r=>r["SECTION"]===currentSection);
        const positions = [...new Set(filtered2.map(r=>r["NEW POSITION / TITLE"]).filter(x=>x))].sort();
        filterPosition.innerHTML = '<option value="ALL">Semua Posisi</option>' + positions.map(p=>`<option value="${p}">${p}</option>`).join('');
    }
    function jalankanPencarian() { /* sama */ 
        if(!databaseGlobal.length) return;
        let filtered = databaseGlobal;
        const keyword = searchInput.value.trim().toUpperCase();
        const status = filterStatus.value;
        const section = filterSection.value;
        const pos = filterPosition.value;
        if(status !== "ALL") filtered = filtered.filter(r=>r["STATUS"]===status);
        if(section !== "ALL") filtered = filtered.filter(r=>r["SECTION"]===section);
        if(pos !== "ALL") filtered = filtered.filter(r=>r["NEW POSITION / TITLE"]===pos);
        if(keyword) {
            const isNum = /^\d+$/.test(keyword);
            filtered = filtered.filter(r=> isNum ? String(r["New ID No"]).toUpperCase().includes(keyword) : String(r["NAME"]).toUpperCase().includes(keyword) || String(r["New ID No"]).toUpperCase().includes(keyword));
        }
        renderTabel(filtered);
    }
    function renderTabel(data) {
        totalDataCount.innerText = data.length;
        if(!data.length) { tableHeader.innerHTML=''; tableBody.innerHTML='<tr><td colspan="6" class="p-10 text-center">Tidak ada数据</td></tr>'; return; }
        let headers = ["New ID No","NAME","SECTION","NEW POSITION / TITLE","JOIN DATE","STATUS"];
        let tanggalToShow = (selectedTanggal !== "ALL") ? [selectedTanggal] : tanggalList;
        headers.push(...tanggalToShow);
        currentHeaders = headers;
        let th = `<tr class="bg-slate-800 text-white text-[11px] uppercase">`;
        for(let col of headers) {
            let cls = "px-4 py-2 border-r";
            if(col === "New ID No") cls += " sticky left-0 z-20 bg-slate-800";
            if(col === "NAME") cls += " sticky left-[100px] z-20 bg-slate-800";
            if(tanggalToShow.includes(col)) cls += " attendance-col px-1 text-center";
            th += `<th class="${cls}">${col}</th>`;
        }
        th += `</tr>`;
        tableHeader.innerHTML = th;
        let tb = "";
        const max = Math.min(data.length, 1500);
        for(let i=0; i<max; i++) {
            const row = data[i];
            tb += `<tr class="hover:bg-blue-50 border-b">`;
            for(let col of headers) {
                let val = row[col] ?? "";
                let extra = "px-4 py-2";
                let style = "";
                if(col === "New ID No") { extra = "sticky left-0 z-10 bg-white font-medium px-4"; style="min-width:100px;"; }
                else if(col === "NAME") { extra = "sticky left-[100px] z-10 bg-white px-4"; style="min-width:200px;"; }
                else if(tanggalToShow.includes(col)) { extra = "attendance-col px-1 text-center time-cell"; }
                if(col === "STATUS") {
                    if(val === "WORKER") val='<span class="bg-emerald-100 px-2 py-0.5 rounded">WORKER</span>';
                    else if(val === "STAFF") val='<span class="bg-purple-100 px-2 py-0.5 rounded">STAFF</span>';
                    else if(val === "SECURITY") val='<span class="bg-slate-700 text-white px-2 py-0.5 rounded">SECURITY</span>';
                }
                if(tanggalToShow.includes(col) && typeof val === 'string') {
                    const upper = val.trim().toUpperCase();
                    if(upper === 'PRP') val = '<span class="text-blue-500 font-bold">PRP</span>';
                    else if(upper === 'PRS') val = '<span class="text-orange-500 font-bold">PRS</span>';
                    else if(upper === 'PRM') val = '<span class="text-gray-600">PRM</span>';
                    else if(upper === 'AL') val = '<span class="bg-blue-500 text-white px-1 rounded">AL</span>';
                    else if(upper === 'SK') val = '<span class="bg-yellow-400 text-black px-1 rounded">SK</span>';
                    else if(upper === 'AB') val = '<span class="text-red-600 font-bold">AB</span>';
                    else if(val === "") val = "—";
                }
                tb += `<td class="${extra}" style="${style}">${val}</td>`;
            }
            tb += `</tr>`;
        }
        if(data.length > 1500) tb += `<tr><td colspan="${headers.length}" class="p-2 text-center text-blue-600">Hanya 1500 baris pertama</td></tr>`;
        tableBody.innerHTML = tb;
    }
    function openSummary() { /* sama */ 
        if(!databaseGlobal.length) { showAlert("Peringatan","Tidak ada data","warning"); return; }
        const summary = new Map();
        let gw=0,gs=0,gsec=0;
        for(const row of databaseGlobal) {
            let pos = row["NEW POSITION / TITLE"] || "UNKNOWN";
            let stat = row["STATUS"];
            if(!summary.has(pos)) summary.set(pos,{WORKER:0,STAFF:0,SECURITY:0,TOTAL:0});
            const d = summary.get(pos);
            if(stat==="WORKER") { d.WORKER++; gw++; }
            else if(stat==="STAFF") { d.STAFF++; gs++; }
            else if(stat==="SECURITY") { d.SECURITY++; gsec++; }
            d.TOTAL++;
        }
        let html = `<table class="w-full border"><thead><tr class="bg-slate-700 text-white"><th class="p-2">POSISI</th><th>WORKER</th><th>STAFF</th><th>SECURITY</th><th>TOTAL</th></tr></thead><tbody>`;
        for(let [pos,data] of [...summary.entries()].sort()) {
            html += `<tr><td class="border p-2">${pos}</td><td class="border p-2 text-center">${data.WORKER}</td><td class="border p-2 text-center">${data.STAFF}</td><td class="border p-2 text-center">${data.SECURITY}</td><td class="border p-2 text-center font-bold">${data.TOTAL}</td></tr>`;
        }
        html += `<tr class="bg-indigo-100 font-bold"><td class="p-2">GRAND TOTAL</td><td class="text-center">${gw}</td><td class="text-center">${gs}</td><td class="text-center">${gsec}</td><td class="text-center">${gw+gs+gsec}</td></tr></tbody>`;
        document.getElementById('summaryContent').innerHTML = html;
        document.getElementById('summaryModal').classList.remove('hidden');
        document.getElementById('summaryModal').classList.add('flex');
    }
    function closeSummary() { document.getElementById('summaryModal').classList.add('hidden'); }
    function exportToExcel() { /* sama */ 
        if(!databaseGlobal.length) { showAlert("Tidak ada data","","warning"); return; }
        let dataToExport = databaseGlobal;
        const status = filterStatus.value;
        const section = filterSection.value;
        const pos = filterPosition.value;
        const keyword = searchInput.value.trim().toUpperCase();
        if(status !== "ALL") dataToExport = dataToExport.filter(r => r["STATUS"] === status);
        if(section !== "ALL") dataToExport = dataToExport.filter(r => r["SECTION"] === section);
        if(pos !== "ALL") dataToExport = dataToExport.filter(r => r["NEW POSITION / TITLE"] === pos);
        if(keyword) {
            const isNum = /^\d+$/.test(keyword);
            dataToExport = dataToExport.filter(r => isNum ? String(r["New ID No"]).toUpperCase().includes(keyword) : String(r["NAME"]).toUpperCase().includes(keyword) || String(r["New ID No"]).toUpperCase().includes(keyword));
        }
        const headers = currentHeaders;
        const wsData = [headers];
        for(const row of dataToExport) {
            const rowArr = headers.map(h => row[h] !== undefined ? row[h] : "");
            wsData.push(rowArr);
        }
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Attendance");
        XLSX.writeFile(wb, `attendance_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.xlsx`);
        showAlert("Berhasil","Data diekspor","success");
    }

    // ======================== LOAD TIME CLOCK ========================
    async function loadTimeFile(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                if(!rows.length) { resolve(new Map()); return; }
                let idCol=-1, dateCol=-1, recordCol=-1;
                for(let i=0; i<Math.min(rows.length,20); i++) {
                    const row = rows[i];
                    for(let c=0;c<row.length;c++) {
                        let cell = String(row[c]||"").toUpperCase();
                        if(cell.includes("ID")) idCol = c;
                        if(cell.includes("DATE")) dateCol = c;
                        if(cell.includes("RECORD")) recordCol = c;
                    }
                    if(idCol !== -1 && dateCol !== -1 && recordCol !== -1) break;
                }
                if(idCol === -1 || dateCol === -1 || recordCol === -1) { resolve(new Map()); return; }
                const timeMapLocal = new Map();
                for(let r=1; r<rows.length; r++) {
                    const row = rows[r];
                    if(!row || row.length===0) continue;
                    let id = String(row[idCol]||"").trim();
                    let dateRaw = row[dateCol];
                    let dateStr = "";
                    if(dateRaw instanceof Date) dateStr = dateRaw.toISOString().slice(0,10);
                    else if(typeof dateRaw === 'number') dateStr = new Date((dateRaw-25569)*86400*1000).toISOString().slice(0,10);
                    else dateStr = String(dateRaw).trim();
                    let record = String(row[recordCol]||"").trim();
                    if(id && dateStr && record) {
                        const tgl = parseInt(dateStr.split('-')[2], 10);
                        if(!isNaN(tgl)) {
                            const key = `${id}_${tgl}`;
                            timeMapLocal.set(key, record);
                        }
                    }
                }
                resolve(timeMapLocal);
            };
            reader.onerror = () => resolve(new Map());
            reader.readAsArrayBuffer(file);
        });
    }

    // ======================== EVENT ========================
    fileUpload.addEventListener('change', (e) => { if(e.target.files.length) prosesFileExcel(Array.from(e.target.files)); });
    timeUpload.addEventListener('change', async (e) => {
        if(!e.target.files.length) return;
        const file = e.target.files[0];
        loadingOverlay.classList.remove('hidden');
        loadingOverlay.classList.add('flex');
        loadingLog.innerHTML = '<li>[TIME] Memuat file time clock...</li>';
        const newTimeMap = await loadTimeFile(file);
        if(newTimeMap.size) {
            timeMap = newTimeMap;
            localStorage.setItem('attendance_timeMap', JSON.stringify(Object.fromEntries(timeMap)));
            addLog(`✅ Berhasil memuat ${timeMap.size} record absensi`, "success");
            if(databaseKaryawan.length) {
                gabungkanDanRender();
                showAlert("Sukses", `Absensi berhasil digabungkan.`, "success");
            } else {
                showAlert("Info", "Data time tersimpan. Upload file .xlsb karyawan terlebih dahulu.", "info");
            }
        } else {
            showAlert("Gagal", "Tidak ada data absensi yang valid. Pastikan kolom ID, Date, Records ada.", "error");
        }
        loadingOverlay.classList.add('hidden');
        e.target.value = "";
    });
    btnSearch.addEventListener('click', jalankanPencarian);
    searchInput.addEventListener('keypress', e=>{if(e.key==='Enter') jalankanPencarian();});
    filterStatus.addEventListener('change', () => { updateDynamicFilters(); jalankanPencarian(); });
    filterSection.addEventListener('change', () => { updateDynamicFilters(); jalankanPencarian(); });
    filterTanggal.addEventListener('change', (e) => { selectedTanggal = e.target.value; jalankanPencarian(); });
    filterPosition.addEventListener('change', jalankanPencarian);
    btnExport.addEventListener('click', exportToExcel);
    resetDataBtn.addEventListener('click', () => {
        if(confirm("Hapus semua data?")) {
            localStorage.clear();
            databaseKaryawan = [];
            timeMap.clear();
            databaseGlobal = [];
            renderTabel([]);
            dbStatus.innerHTML = "Belum ada Data";
            filterSection.innerHTML = '<option value="ALL">Semua Section</option>';
            filterPosition.innerHTML = '<option value="ALL">Semua Posisi</option>';
            filterTanggal.innerHTML = '<option value="ALL">Semua Tanggal</option>';
            showAlert("Reset", "Data berhasil dihapus", "success");
        }
    });

    // Load dari localStorage saat halaman dimuat
    (function loadStoredData() {
        const karyawan = localStorage.getItem('attendance_karyawan');
        const tglList = localStorage.getItem('attendance_tanggalList');
        const timeObj = localStorage.getItem('attendance_timeMap');
        if(karyawan && tglList) {
            databaseKaryawan = JSON.parse(karyawan);
            tanggalList = JSON.parse(tglList);
            if(timeObj) timeMap = new Map(Object.entries(JSON.parse(timeObj)));
            if(databaseKaryawan.length) gabungkanDanRender();
        }
    })();
