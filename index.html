<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoplun - Attendance Dashboard</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="hoplun128.png">
    <link rel="shortcut icon" href="hoplun128.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        * { font-size: 11px; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .table-container { max-height: 60vh; overflow: auto; }
        th { position: sticky; top: 0; background-color: #1e293b; color: white; z-index: 10; }
        .attendance-col { min-width: 95px; text-align: center; }
        .time-cell { font-family: monospace; font-size: 9px; white-space: pre-line; }
        .sticky-id { position: sticky; left: 0; background-color: white; z-index: 9; }
        .sticky-name { position: sticky; left: 100px; background-color: white; z-index: 9; }
        .btn-export { background: #059669; transition: 0.2s; }
        .btn-export:hover { background: #047857; }
        .btn-reset { background: #dc2626; }
        .btn-reset:hover { background: #b91c1c; }
        /* Custom scroll */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="p-3">

<div class="max-w-full mx-auto bg-white shadow-xl rounded-lg overflow-hidden border border-gray-200">
    <!-- HEADER with Logo -->
    <div class="bg-slate-800 text-white p-3 flex justify-between items-center flex-wrap gap-3">
        <div class="flex items-center gap-3">
            <img src="hoplun128.png" alt="Hoplun" class="h-10 w-10 object-contain rounded-full bg-white p-1">
            <div>
                <h1 class="text-lg font-bold tracking-wider">HOPLUN ATTENDANCE DASHBOARD</h1>
                <p class="text-[10px] text-emerald-400">⚡ Ultra Fast | Custom Range | Format PR|Time | Filter Absensi</p>
            </div>
        </div>
        <div class="flex items-center gap-2 bg-slate-700 p-1.5 rounded-lg flex-wrap">
            <div class="flex items-center gap-1 bg-slate-600 px-2 py-1 rounded">
                <label class="text-[10px] font-semibold">Header Baris:</label>
                <input type="number" id="headerRow" value="6" class="w-10 px-1 py-0.5 text-black font-bold rounded text-[10px] text-center">
            </div>
            <label for="fileUpload" class="text-[10px] font-semibold cursor-pointer flex items-center gap-1 hover:text-blue-300 bg-slate-600 px-2 py-1 rounded">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                .xlsb
            </label>
            <input type="file" id="fileUpload" class="hidden" multiple accept=".xlsb">
            <label for="timeUpload" class="text-[10px] font-semibold cursor-pointer flex items-center gap-1 hover:text-yellow-300 bg-slate-600 px-2 py-1 rounded">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Time
            </label>
            <input type="file" id="timeUpload" class="hidden" accept=".csv,.xlsx,.xls">
            <button id="resetDataBtn" class="bg-red-600 hover:bg-red-700 text-white px-2 py-1 rounded text-[10px]">Reset</button>
        </div>
    </div>

    <!-- PANEL FILTER -->
    <div class="p-3 bg-slate-50 border-b border-gray-200 grid grid-cols-1 lg:grid-cols-12 gap-3 relative">
        <div id="loadingOverlay" class="absolute inset-0 bg-white/95 z-20 hidden flex-col items-center justify-center backdrop-blur-sm">
            <div class="relative w-16 h-16 mb-2"><div class="absolute inset-0 rounded-full border-t-4 border-blue-600 animate-spin"></div></div>
            <h2 class="text-lg font-bold">Memproses Data</h2>
            <p class="text-xs" id="loadingSubText"></p>
            <div class="mt-2 w-full max-w-2xl bg-slate-900 rounded p-2"><ul id="loadingLog" class="text-[9px] text-green-400 font-mono h-28 overflow-y-auto"></ul></div>
        </div>

        <div class="lg:col-span-9 flex flex-col gap-2">
            <div class="flex gap-2">
                <input type="text" id="searchInput" placeholder="Nama / ID" class="w-full bg-yellow-100 border border-yellow-400 px-3 py-1.5 rounded text-xs">
                <button id="btnSearch" class="bg-white px-4 rounded border text-xs">Cari</button>
            </div>
            <div class="flex flex-wrap gap-2 items-center">
                <select id="filterStatus" class="bg-white border rounded px-2 py-1 text-xs"><option value="ALL">Status</option><option value="WORKER">WORKER</option><option value="STAFF">STAFF</option><option value="SECURITY">SECURITY</option></select>
                <select id="filterSection" class="bg-white border rounded px-2 py-1 text-xs min-w-[120px]"><option value="ALL">Section</option></select>
                <select id="filterPosition" class="bg-white border rounded px-2 py-1 text-xs min-w-[120px]"><option value="ALL">Posisi</option></select>
                
                <!-- Filter range tanggal custom -->
                <div class="flex items-center gap-1 bg-white border rounded px-2 py-1">
                    <span class="text-[10px] font-semibold">Tgl:</span>
                    <select id="dateFrom" class="text-[10px] border-none bg-transparent focus:outline-none">
                        <option value="ALL">Dari</option>
                    </select>
                    <span class="text-[10px]">-</span>
                    <select id="dateTo" class="text-[10px] border-none bg-transparent focus:outline-none">
                        <option value="ALL">Sampai</option>
                    </select>
                </div>
                
                <!-- Filter kehadiran -->
                <select id="filterAttendance" class="bg-white border rounded px-2 py-1 text-xs">
                    <option value="ALL">Semua</option>
                    <option value="HADIR">Hadir (ada Time)</option>
                    <option value="TIDAK_HADIR">Tidak Hadir (tanpa Time)</option>
                </select>
            </div>
        </div>
        <div class="lg:col-span-3 flex flex-col gap-2">
            <div class="grid grid-cols-2 gap-2 text-center">
                <div class="bg-green-100 p-1 rounded"><div class="text-[9px] font-bold">Total Tampil</div><div class="text-base font-black" id="totalDataCount">0</div></div>
                <div class="bg-blue-100 p-1 rounded"><div class="text-[9px] font-bold">Status DB</div><span id="dbStatus" class="inline-block px-1 py-0.5 rounded-full text-[8px] font-semibold bg-red-100">Kosong</span></div>
            </div>
            <div class="flex gap-2">
                <button onclick="openSummary()" class="w-1/2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-1.5 rounded text-[10px]">Summary</button>
                <button id="btnExport" class="w-1/2 btn-export text-white font-bold py-1.5 rounded text-[10px]">Export XLSX</button>
            </div>
        </div>
    </div>

    <!-- TABEL -->
    <div class="table-container bg-white">
        <table class="w-full text-left border-collapse whitespace-nowrap text-[10px]">
            <thead id="tableHeader"></thead>
            <tbody id="tableBody"><tr><td colspan="6" class="p-6 text-center text-gray-400 text-xs">Upload file .xlsb (WORKER/STAFF/SECURITY) lalu Time Clock</td></tr></tbody>
        </table>
    </div>
</div>

<!-- Modal Summary -->
<div id="summaryModal" class="hidden fixed inset-0 bg-black/60 z-40 items-center justify-center p-4"><div class="bg-white rounded-lg w-full max-w-4xl max-h-[85vh] flex flex-col"><div class="p-3 border-b bg-slate-800 text-white rounded-t-lg flex justify-between"><h2 class="text-base font-bold">Summary per Posisi & Status</h2><button onclick="closeSummary()" class="text-gray-300">&times;</button></div><div class="p-3 overflow-auto" id="summaryContent"></div></div></div>
<div id="modernAlert" class="hidden fixed inset-0 bg-black/60 z-50 items-center justify-center"><div class="bg-white rounded-xl p-4 max-w-xs text-center"><div id="alertIcon"></div><h3 id="alertTitle" class="text-base font-bold mb-1"></h3><p id="alertMessage" class="text-xs mb-4"></p><button onclick="closeAlert()" class="w-full bg-blue-600 text-white py-1.5 rounded text-xs">Mengerti</button></div></div>

<script>
    // ======================== KONFIGURASI CEPAT ========================
    let databaseKaryawan = [];      // array of { id, name, section, position, joinDate, status, kodePerTanggal: { "1":"PRP", ... } }
    let timeMap = new Map();         // key = `${id}_${tanggal}` -> raw record "05:42;14:40"
    let semuaTanggal = [];           // array angka tanggal (26..31,1..25)
    let currentHeaders = [];
    let databaseGlobal = [];         // array of { ...personal, tanggalData: { "1": {kode, time} } }
    let selectedRange = { from: "ALL", to: "ALL" };
    let filterAttendance = "ALL";
    const MAX_CONCURRENT = 6;
    const MAX_BARIS_PER_FILE = 2500;

    // DOM
    const fileUpload = document.getElementById('fileUpload');
    const timeUpload = document.getElementById('timeUpload');
    const headerRowInput = document.getElementById('headerRow');
    const searchInput = document.getElementById('searchInput');
    const btnSearch = document.getElementById('btnSearch');
    const filterStatus = document.getElementById('filterStatus');
    const filterSection = document.getElementById('filterSection');
    const filterPosition = document.getElementById('filterPosition');
    const filterAttendanceSelect = document.getElementById('filterAttendance');
    const dateFrom = document.getElementById('dateFrom');
    const dateTo = document.getElementById('dateTo');
    const btnExport = document.getElementById('btnExport');
    const resetDataBtn = document.getElementById('resetDataBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingSubText = document.getElementById('loadingSubText');
    const loadingLog = document.getElementById('loadingLog');
    const tableHeader = document.getElementById('tableHeader');
    const tableBody = document.getElementById('tableBody');
    const totalDataCount = document.getElementById('totalDataCount');
    const dbStatus = document.getElementById('dbStatus');

    // Helper log
    function addLog(msg, type="info") {
        if(!loadingLog) return;
        const li = document.createElement('li');
        li.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        li.className = type==="error"?"text-red-400":type==="success"?"text-emerald-400":type==="warning"?"text-yellow-400":"text-green-400";
        loadingLog.appendChild(li);
        loadingLog.scrollTop = loadingLog.scrollHeight;
    }
    function showAlert(title, msg, type='info') {
        const modal = document.getElementById('modernAlert');
        document.getElementById('alertTitle').innerText = title;
        document.getElementById('alertMessage').innerText = msg;
        const icon = document.getElementById('alertIcon');
        if(type==='success') icon.innerHTML = '<div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center text-green-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></div>';
        else if(type==='error') icon.innerHTML = '<div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center text-red-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></div>';
        else icon.innerHTML = '<div class="w-12 h-12 rounded-full bg-yellow-100 flex items-center justify-center text-yellow-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg></div>';
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }
    function closeAlert() { document.getElementById('modernAlert').classList.add('hidden'); }
    function formatDateToString(d) {
        if(!d) return "";
        let date;
        if(d instanceof Date) date=d;
        else if(typeof d==='number') date=new Date((d-25569)*86400*1000);
        else date=new Date(d);
        if(isNaN(date.getTime())) return String(d);
        const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return `${String(date.getDate()).padStart(2,'0')}-${months[date.getMonth()]}-${date.getFullYear()}`;
    }
    function formatTimeRange(record) {
        if(!record) return "";
        const parts = record.split(';').map(p=>p.trim()).filter(p=>p);
        if(parts.length===0) return "";
        if(parts.length===1) return parts[0];
        return `${parts[0]}-${parts[parts.length-1]}`;
    }

    // ======================== BACA FILE .XLSB (OPTIMASI) ========================
    async function bacaFileXLSB(file, forcedStatus) {
        return new Promise(async (resolve) => {
            try {
                const data = await readFileAsArrayBuffer(file);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                let sheetName = workbook.SheetNames.find(s => s.toUpperCase().includes('ATTEND')) || workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                let range = XLSX.utils.decode_range(worksheet['!ref'] || "A1:AK1000");
                if(range.e.r > MAX_BARIS_PER_FILE) range.e.r = MAX_BARIS_PER_FILE;
                const rawData = XLSX.utils.sheet_to_json(worksheet, { header:1, defval:"", blankrows:false, range: XLSX.utils.encode_range(range) });
                if(!rawData.length) { resolve(null); return; }
                
                // Deteksi header otomatis
                let headerRowIdx = -1, colMap = { id:-1, name:-1, section:-1, position:-1, join:-1 };
                for(let r=0; r<Math.min(rawData.length,15); r++) {
                    const row = rawData[r];
                    if(!row) continue;
                    let hasID=false, hasName=false;
                    for(let c=0;c<row.length;c++) {
                        let val = String(row[c]||"").toUpperCase().replace(/\s/g,'');
                        if(val.includes("NEWID")||val==="IDNO"||val==="ID") hasID=true;
                        if(val==="NAME"||val==="NAMA") hasName=true;
                    }
                    if(hasID && hasName) {
                        headerRowIdx = r;
                        for(let c=0;c<row.length;c++) {
                            let val = String(row[c]||"").toUpperCase().replace(/\s/g,'');
                            if(val.includes("NEWID")||val==="IDNO"||val==="ID") colMap.id = c;
                            else if(val==="NAME"||val==="NAMA") colMap.name = c;
                            else if(val.includes("SECT")) colMap.section = c;
                            else if(val.includes("POSITI")||val.includes("TITLE")) colMap.position = c;
                            else if(val.includes("JOIN")) colMap.join = c;
                        }
                        break;
                    }
                }
                if(headerRowIdx === -1) {
                    headerRowIdx = parseInt(headerRowInput.value)-1 || 5;
                    colMap = { id:0, name:1, section:2, position:3, join:4 };
                }
                // Cari kolom tanggal (angka) dari baris header
                const headerRow = rawData[headerRowIdx];
                const colTanggal = {};
                for(let c=0; c<headerRow.length; c++) {
                    let val = String(headerRow[c]||"").trim();
                    if(/^\d+$/.test(val)) colTanggal[val] = c;
                }
                const karyawanMap = new Map();
                for(let r=headerRowIdx+1; r<rawData.length; r++) {
                    const row = rawData[r];
                    if(!row) continue;
                    let id = String(row[colMap.id]||"").trim();
                    let name = String(row[colMap.name]||"").trim();
                    if(id==="" && name==="") continue;
                    const rowStr = JSON.stringify(row).toLowerCase();
                    if(rowStr.includes("hadir penuh")||rowStr.includes("mangkir")||rowStr.includes("sakit")||rowStr.includes("cuti tahunan")||rowStr.includes("cuti lain-lain")) continue;
                    const kodePerTanggal = {};
                    for(let [tgl, colIdx] of Object.entries(colTanggal)) {
                        let val = row[colIdx];
                        if(val !== undefined && val !== null && val !== "") kodePerTanggal[tgl] = String(val).trim();
                    }
                    const personal = {
                        id: id,
                        name: name,
                        section: String(row[colMap.section]||"").trim(),
                        position: String(row[colMap.position]||"").trim(),
                        joinDate: row[colMap.join] ? formatDateToString(row[colMap.join]) : "",
                        status: forcedStatus,
                        kodePerTanggal: kodePerTanggal
                    };
                    let key = id !== "" ? id.toUpperCase() : name.toUpperCase();
                    if(!karyawanMap.has(key)) karyawanMap.set(key, personal);
                }
                if(karyawanMap.size) resolve({ map: karyawanMap, fileName: file.name });
                else resolve(null);
            } catch(e) { addLog(`Error ${file.name}: ${e.message}`,"error"); resolve(null); }
        });
    }

    function isFileValid(file) { return file.name.toLowerCase().endsWith('.xlsb') && /WORKER|STAFF|SECURITY/i.test(file.name); }
    function getForcedStatus(fileName) { if(/STAFF/i.test(fileName)) return "STAFF"; if(/SECURITY/i.test(fileName)) return "SECURITY"; return "WORKER"; }

    async function prosesFileExcel(files) {
        if(!files.length) return;
        loadingOverlay.classList.remove('hidden');
        loadingOverlay.classList.add('flex');
        loadingLog.innerHTML = '<li>[SISTEM] Memuat .xlsb (paralel 6, max 2500 baris)...</li>';
        const valid = [];
        for(let f of files) if(isFileValid(f)) valid.push(f);
        if(!valid.length) { showAlert("Peringatan","Tidak ada file .xlsb valid","warning"); loadingOverlay.classList.add('hidden'); return; }
        loadingSubText.innerText = `Memproses ${valid.length} file .xlsb...`;
        const allResults = [];
        for(let i=0;i<valid.length;i+=MAX_CONCURRENT) {
            const batch = valid.slice(i,i+MAX_CONCURRENT);
            const promises = batch.map(f => bacaFileXLSB(f, getForcedStatus(f.name)));
            const res = await Promise.all(promises);
            allResults.push(...res);
            loadingSubText.innerText = `Proses ${Math.min(i+MAX_CONCURRENT,valid.length)}/${valid.length} file...`;
        }
        const masterMap = new Map();
        const berhasil = [];
        for(const res of allResults) {
            if(res && res.map.size) {
                for(let [k,v] of res.map) if(!masterMap.has(k)) masterMap.set(k,v);
                berhasil.push(res.fileName);
            }
        }
        if(!masterMap.size) { showAlert("Gagal","Tidak ada data karyawan","error"); loadingOverlay.classList.add('hidden'); return; }
        databaseKaryawan = Array.from(masterMap.values());
        // Buat semuaTanggal (26-31,1-25)
        semuaTanggal = [];
        for(let i=26;i<=31;i++) semuaTanggal.push(i);
        for(let i=1;i<=25;i++) semuaTanggal.push(i);
        // Simpan ke localStorage
        localStorage.setItem('hoplun_karyawan', JSON.stringify(databaseKaryawan.map(k => ({ ...k, kodePerTanggal: k.kodePerTanggal }))));
        localStorage.setItem('hoplun_tanggal', JSON.stringify(semuaTanggal));
        gabungkanDanRender();
        loadingOverlay.classList.add('hidden');
        showAlert("Sukses",`${databaseKaryawan.length} karyawan dimuat. Upload time clock.`,"success");
    }

    // ======================== BACA TIME CLOCK ========================
    async function loadTimeFile(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                if(!rows.length) { resolve(new Map()); return; }
                let idCol=-1, dateCol=-1, recordCol=-1;
                for(let i=0;i<Math.min(rows.length,20);i++) {
                    const row = rows[i];
                    for(let c=0;c<row.length;c++) {
                        let cell = String(row[c]||"").toUpperCase();
                        if(cell.includes("ID")) idCol = c;
                        if(cell.includes("DATE")) dateCol = c;
                        if(cell.includes("RECORD")) recordCol = c;
                    }
                    if(idCol!==-1 && dateCol!==-1 && recordCol!==-1) break;
                }
                if(idCol===-1 || dateCol===-1 || recordCol===-1) { resolve(new Map()); return; }
                const timeMapLocal = new Map();
                for(let r=1; r<rows.length; r++) {
                    const row = rows[r];
                    if(!row) continue;
                    let id = String(row[idCol]||"").trim();
                    let dateRaw = row[dateCol];
                    let dateStr = "";
                    if(dateRaw instanceof Date) dateStr = dateRaw.toISOString().slice(0,10);
                    else if(typeof dateRaw === 'number') dateStr = new Date((dateRaw-25569)*86400*1000).toISOString().slice(0,10);
                    else dateStr = String(dateRaw).trim();
                    let record = String(row[recordCol]||"").trim();
                    if(id && dateStr && record) {
                        let tgl = parseInt(dateStr.split('-')[2], 10);
                        if(!isNaN(tgl)) timeMapLocal.set(`${id}_${tgl}`, record);
                    }
                }
                resolve(timeMapLocal);
            };
            reader.onerror = () => resolve(new Map());
            reader.readAsArrayBuffer(file);
        });
    }

    // ======================== GABUNGKAN DATA ========================
    function gabungkanDanRender() {
        if(!databaseKaryawan.length) return;
        const finalData = databaseKaryawan.map(karyawan => {
            const tanggalData = {};
            for(let tgl of semuaTanggal) {
                const kode = karyawan.kodePerTanggal?.[String(tgl)] || "";
                const timeRaw = timeMap.get(`${karyawan.id}_${tgl}`);
                const timeFormatted = timeRaw ? formatTimeRange(timeRaw) : "";
                tanggalData[tgl] = { kode, time: timeFormatted };
            }
            return {
                id: karyawan.id,
                name: karyawan.name,
                section: karyawan.section,
                position: karyawan.position,
                joinDate: karyawan.joinDate,
                status: karyawan.status,
                tanggalData: tanggalData
            };
        });
        databaseGlobal = finalData;
        // Update dropdown tanggal custom
        const optFrom = ['<option value="ALL">Dari</option>'];
        const optTo = ['<option value="ALL">Sampai</option>'];
        for(let t of semuaTanggal) {
            optFrom.push(`<option value="${t}">${t}</option>`);
            optTo.push(`<option value="${t}">${t}</option>`);
        }
        dateFrom.innerHTML = optFrom.join('');
        dateTo.innerHTML = optTo.join('');
        dateFrom.value = "ALL";
        dateTo.value = "ALL";
        selectedRange = { from: "ALL", to: "ALL" };
        updateDynamicFilters();
        applyAllFilters();
        dbStatus.innerHTML = `✅ Karyawan: ${databaseKaryawan.length} | Absen: ${timeMap.size}`;
        dbStatus.className = "inline-block px-1 py-0.5 rounded-full text-[8px] font-semibold bg-green-100 text-green-800";
    }

    // ======================== FILTER CASCADING ========================
    function updateDynamicFilters() {
        if(!databaseGlobal.length) return;
        let filtered = databaseGlobal;
        const currentStatus = filterStatus.value;
        if(currentStatus !== "ALL") filtered = filtered.filter(r => r.status === currentStatus);
        const sections = [...new Set(filtered.map(r => r.section).filter(x=>x))].sort();
        filterSection.innerHTML = '<option value="ALL">Section</option>' + sections.map(s=>`<option value="${s}">${s}</option>`).join('');
        const currentSection = filterSection.value;
        let filtered2 = filtered;
        if(currentSection !== "ALL") filtered2 = filtered2.filter(r => r.section === currentSection);
        const positions = [...new Set(filtered2.map(r => r.position).filter(x=>x))].sort();
        filterPosition.innerHTML = '<option value="ALL">Posisi</option>' + positions.map(p=>`<option value="${p}">${p}</option>`).join('');
    }

    // ======================== FILTER UTAMA ========================
    function getTanggalRange() {
        let from = dateFrom.value;
        let to = dateTo.value;
        if(from === "ALL" || to === "ALL") return semuaTanggal;
        let fromIdx = semuaTanggal.indexOf(parseInt(from));
        let toIdx = semuaTanggal.indexOf(parseInt(to));
        if(fromIdx === -1 || toIdx === -1) return semuaTanggal;
        if(fromIdx <= toIdx) return semuaTanggal.slice(fromIdx, toIdx+1);
        else return [...semuaTanggal.slice(fromIdx), ...semuaTanggal.slice(0, toIdx+1)];
    }

    function applyAllFilters() {
        if(!databaseGlobal.length) return;
        let filtered = [...databaseGlobal];
        // Status, section, position
        const status = filterStatus.value;
        if(status !== "ALL") filtered = filtered.filter(r => r.status === status);
        const section = filterSection.value;
        if(section !== "ALL") filtered = filtered.filter(r => r.section === section);
        const pos = filterPosition.value;
        if(pos !== "ALL") filtered = filtered.filter(r => r.position === pos);
        // Search
        const keyword = searchInput.value.trim().toUpperCase();
        if(keyword) {
            const isNum = /^\d+$/.test(keyword);
            filtered = filtered.filter(r => isNum ? r.id.toUpperCase().includes(keyword) : r.name.toUpperCase().includes(keyword) || r.id.toUpperCase().includes(keyword));
        }
        // Filter kehadiran (berdasarkan range tanggal yang dipilih)
        const range = getTanggalRange();
        filterAttendance = filterAttendanceSelect.value;
        if(filterAttendance !== "ALL") {
            filtered = filtered.filter(row => {
                for(let tgl of range) {
                    const time = row.tanggalData[tgl]?.time || "";
                    if(filterAttendance === "HADIR" && time !== "") return true;
                    if(filterAttendance === "TIDAK_HADIR" && time === "") return true;
                }
                return false;
            });
        }
        renderTabel(filtered, range);
    }

    function renderTabel(data, range) {
        totalDataCount.innerText = data.length;
        if(!data.length) { tableHeader.innerHTML=''; tableBody.innerHTML='<tr><td colspan="6" class="p-6 text-center">Tidak ada data</td></tr>'; return; }
        // Header: kolom tetap + tanggal dalam range
        const fixedCols = ["ID", "NAMA", "SECTION", "POSISI", "JOIN DATE", "STATUS"];
        const tanggalCols = range;
        const headers = [...fixedCols, ...tanggalCols.map(t => `Tgl ${t}`)];
        currentHeaders = headers;
        let th = `<tr class="bg-slate-800 text-white text-[10px] uppercase">`;
        for(let i=0; i<headers.length; i++) {
            let col = headers[i];
            let cls = "px-2 py-1.5 border-r";
            if(i===0) cls += " sticky left-0 z-20 bg-slate-800";
            if(i===1) cls += " sticky left-[70px] z-20 bg-slate-800";
            if(i>=6) cls += " attendance-col";
            th += `<th class="${cls}">${col}</th>`;
        }
        th += `</tr>`;
        tableHeader.innerHTML = th;
        let tb = "";
        const max = Math.min(data.length, 2000);
        for(let row of data.slice(0,max)) {
            tb += `<tr class="hover:bg-blue-50 border-b">`;
            // Kolom tetap
            const fixedVals = [row.id, row.name, row.section, row.position, row.joinDate, row.status];
            for(let i=0; i<fixedVals.length; i++) {
                let val = fixedVals[i];
                let extra = "px-2 py-1";
                let style = "";
                if(i===0) { extra = "sticky left-0 z-10 bg-white font-medium px-2"; style="min-width:90px; box-shadow:2px 0 5px -2px rgba(0,0,0,0.1)"; }
                if(i===1) { extra = "sticky left-[70px] z-10 bg-white px-2"; style="min-width:140px; box-shadow:2px 0 5px -2px rgba(0,0,0,0.1)"; }
                if(i===5) {
                    if(val==="WORKER") val='<span class="bg-emerald-100 px-1 py-0.5 rounded text-[9px]">WORKER</span>';
                    else if(val==="STAFF") val='<span class="bg-purple-100 px-1 py-0.5 rounded text-[9px]">STAFF</span>';
                    else if(val==="SECURITY") val='<span class="bg-slate-700 text-white px-1 py-0.5 rounded text-[9px]">SECURITY</span>';
                }
                tb += `<td class="${extra}" style="${style}">${val}</td>`;
            }
            // Kolom tanggal
            for(let tgl of tanggalCols) {
                const dataTgl = row.tanggalData[tgl] || { kode: "", time: "" };
                let kode = dataTgl.kode;
                let time = dataTgl.time;
                let display = "";
                if(kode && time) display = `${kode}|${time}`;
                else if(kode) display = kode;
                else if(time) display = time;
                else display = "—";
                // Warna jika hanya kode tanpa time (tidak hadir)
                if(kode && !time) display = `<span class="text-orange-500">${display}</span>`;
                else if(time) display = `<span class="text-green-600">${display}</span>`;
                tb += `<td class="attendance-col px-1 py-1 text-center time-cell">${display}</td>`;
            }
            tb += `</tr>`;
        }
        if(data.length > 2000) tb += `<tr><td colspan="${headers.length}" class="p-2 text-center text-blue-500 text-[9px]">Hanya 2000 baris pertama</td></tr>`;
        tableBody.innerHTML = tb;
    }

    // ======================== SUMMARY ========================
    function openSummary() {
        if(!databaseGlobal.length) { showAlert("Peringatan","Tidak ada data","warning"); return; }
        const summary = new Map();
        let gw=0,gs=0,gsec=0;
        for(const row of databaseGlobal) {
            let pos = row.position || "UNKNOWN";
            let stat = row.status;
            if(!summary.has(pos)) summary.set(pos,{WORKER:0,STAFF:0,SECURITY:0,TOTAL:0});
            const d = summary.get(pos);
            if(stat==="WORKER") { d.WORKER++; gw++; }
            else if(stat==="STAFF") { d.STAFF++; gs++; }
            else if(stat==="SECURITY") { d.SECURITY++; gsec++; }
            d.TOTAL++;
        }
        let html = `<table class="w-full border text-[10px]"><thead><tr class="bg-slate-700 text-white"><th class="p-1">POSISI</th><th>WORKER</th><th>STAFF</th><th>SECURITY</th><th>TOTAL</th></tr></thead><tbody>`;
        for(let [pos,data] of [...summary.entries()].sort()) {
            html += `<tr><td class="border p-1">${pos}</td><td class="border p-1 text-center">${data.WORKER}</td><td class="border p-1 text-center">${data.STAFF}</td><td class="border p-1 text-center">${data.SECURITY}</td><td class="border p-1 text-center font-bold">${data.TOTAL}</td></tr>`;
        }
        html += `<tr class="bg-indigo-100 font-bold"><td class="p-1">GRAND TOTAL</td><td class="text-center">${gw}</td><td class="text-center">${gs}</td><td class="text-center">${gsec}</td><td class="text-center">${gw+gs+gsec}</td></tr></tbody>`;
        document.getElementById('summaryContent').innerHTML = html;
        document.getElementById('summaryModal').classList.remove('hidden');
        document.getElementById('summaryModal').classList.add('flex');
    }
    function closeSummary() { document.getElementById('summaryModal').classList.add('hidden'); }

    // ======================== EXPORT ========================
    function exportToExcel() {
        if(!databaseGlobal.length) { showAlert("Tidak ada data","","warning"); return; }
        // Ambil data sesuai filter yang sedang aktif
        let filtered = [...databaseGlobal];
        const status = filterStatus.value;
        if(status !== "ALL") filtered = filtered.filter(r => r.status === status);
        const section = filterSection.value;
        if(section !== "ALL") filtered = filtered.filter(r => r.section === section);
        const pos = filterPosition.value;
        if(pos !== "ALL") filtered = filtered.filter(r => r.position === pos);
        const keyword = searchInput.value.trim().toUpperCase();
        if(keyword) {
            const isNum = /^\d+$/.test(keyword);
            filtered = filtered.filter(r => isNum ? r.id.toUpperCase().includes(keyword) : r.name.toUpperCase().includes(keyword) || r.id.toUpperCase().includes(keyword));
        }
        const range = getTanggalRange();
        // Filter kehadiran
        if(filterAttendance !== "ALL") {
            filtered = filtered.filter(row => {
                for(let tgl of range) {
                    const time = row.tanggalData[tgl]?.time || "";
                    if(filterAttendance === "HADIR" && time !== "") return true;
                    if(filterAttendance === "TIDAK_HADIR" && time === "") return true;
                }
                return false;
            });
        }
        const fixedCols = ["ID", "NAMA", "SECTION", "POSISI", "JOIN DATE", "STATUS"];
        const tanggalCols = range;
        const headers = [...fixedCols, ...tanggalCols.map(t => `Tgl ${t}`)];
        const wsData = [headers];
        for(const row of filtered) {
            const rowArr = [
                row.id, row.name, row.section, row.position, row.joinDate, row.status
            ];
            for(let tgl of tanggalCols) {
                const dataTgl = row.tanggalData[tgl] || { kode: "", time: "" };
                let kode = dataTgl.kode;
                let time = dataTgl.time;
                let display = "";
                if(kode && time) display = `${kode}|${time}`;
                else if(kode) display = kode;
                else if(time) display = time;
                else display = "";
                rowArr.push(display);
            }
            wsData.push(rowArr);
        }
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Attendance");
        XLSX.writeFile(wb, `hoplun_attendance_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.xlsx`);
        showAlert("Berhasil","Data diekspor","success");
    }

    // ======================== EVENT LISTENERS ========================
    function readFileAsArrayBuffer(file) {
        return new Promise((resolve,reject)=>{ const fr=new FileReader(); fr.onload=e=>resolve(e.target.result); fr.onerror=()=>reject(); fr.readAsArrayBuffer(file); });
    }
    fileUpload.addEventListener('change', (e) => { if(e.target.files.length) prosesFileExcel(Array.from(e.target.files)); });
    timeUpload.addEventListener('change', async (e) => {
        if(!e.target.files.length) return;
        const file = e.target.files[0];
        loadingOverlay.classList.remove('hidden');
        loadingOverlay.classList.add('flex');
        loadingLog.innerHTML = '<li>[TIME] Memuat time clock...</li>';
        const newTimeMap = await loadTimeFile(file);
        if(newTimeMap.size) {
            timeMap = newTimeMap;
            localStorage.setItem('hoplun_time', JSON.stringify(Object.fromEntries(timeMap)));
            if(databaseKaryawan.length) gabungkanDanRender();
            else showAlert("Info","Data time tersimpan. Upload .xlsb dulu.","info");
        } else { showAlert("Gagal","Tidak ada data time valid","error"); }
        loadingOverlay.classList.add('hidden');
        e.target.value = "";
    });
    btnSearch.addEventListener('click', () => applyAllFilters());
    searchInput.addEventListener('keypress', e=>{if(e.key==='Enter') applyAllFilters();});
    filterStatus.addEventListener('change', () => { updateDynamicFilters(); applyAllFilters(); });
    filterSection.addEventListener('change', () => { updateDynamicFilters(); applyAllFilters(); });
    filterPosition.addEventListener('change', () => applyAllFilters());
    filterAttendanceSelect.addEventListener('change', () => applyAllFilters());
    dateFrom.addEventListener('change', () => applyAllFilters());
    dateTo.addEventListener('change', () => applyAllFilters());
    btnExport.addEventListener('click', exportToExcel);
    resetDataBtn.addEventListener('click', () => {
        if(confirm("Hapus semua data?")) { localStorage.clear(); databaseKaryawan=[]; timeMap.clear(); databaseGlobal=[]; renderTabel([],[]); dbStatus.innerHTML="Kosong"; filterSection.innerHTML='<option value="ALL">Section</option>'; filterPosition.innerHTML='<option value="ALL">Posisi</option>'; showAlert("Reset","Data dihapus","success"); }
    });
    // Load dari localStorage
    (function loadStored() {
        const karyawan = localStorage.getItem('hoplun_karyawan');
        const tanggal = localStorage.getItem('hoplun_tanggal');
        const timeObj = localStorage.getItem('hoplun_time');
        if(karyawan && tanggal) {
            databaseKaryawan = JSON.parse(karyawan);
            semuaTanggal = JSON.parse(tanggal);
            if(timeObj) timeMap = new Map(Object.entries(JSON.parse(timeObj)));
            if(databaseKaryawan.length) gabungkanDanRender();
        }
    })();
</script>
