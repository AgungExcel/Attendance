<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hoplun - Attendance Dashboard (Super Fast)</title>
    <link rel="icon" type="image/png" href="hoplun128.png">
    <link rel="shortcut icon" href="hoplun128.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        * { font-size: 11px; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            margin: 0; 
            padding: 8px; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }
        .dashboard-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .table-container { 
            flex: 1; 
            overflow: auto; 
            border: 1px solid #e2e8f0; 
            border-radius: 8px; 
            background: white;
            scroll-padding-top: 70px;
            will-change: transform;
            contain: layout style paint;
        }
        table { 
            border-collapse: collapse; 
            width: 100%;
            table-layout: fixed;
        }
        th, td {
            overflow: hidden;
            text-overflow: ellipsis;
        }
        thead tr:first-child th {
            position: sticky;
            top: 0;
            background-color: #1e293b;
            color: white;
            z-index: 20;
            padding: 6px 4px;
            font-weight: 600;
            font-size: 10px;
            white-space: nowrap;
            height: 32px;
            line-height: 1.2;
        }
        thead tr:nth-child(2) th {
            position: sticky;
            top: 32px;
            background-color: #f3f4f6;
            color: #1f2937;
            z-index: 19;
            padding: 4px 4px;
            height: 32px;
            border-top: 1px solid #e5e7eb;
            overflow: visible;
        }
        td { 
            padding: 4px 4px; 
            border-bottom: 1px solid #e2e8f0;
            white-space: nowrap;
        }
        .attendance-col { 
            min-width: 90px; 
            text-align: center; 
        }
        .time-cell { 
            font-family: monospace; 
            font-size: 9px; 
            white-space: pre-line; 
        }
        .sticky-no, .sticky-id, .sticky-name {
            position: sticky;
            background-color: white;
            z-index: 10;
        }
        .sticky-no { left: 0; width: 40px !important; min-width: 40px !important; max-width: 40px !important; text-align: center; }
        .sticky-id { left: 40px; width: 70px !important; min-width: 70px !important; max-width: 70px !important; }
        .sticky-name { left: 110px; width: 120px !important; min-width: 120px !important; max-width: 120px !important; }
        .col-section-fixed { width: 100px !important; min-width: 100px !important; }
        .col-posisi-fixed { width: 100px !important; min-width: 100px !important; }
        .col-join-fixed { width: 85px !important; min-width: 85px !important; }
        .col-status-fixed { width: 75px !important; min-width: 75px !important; }
        
        .multi-select, .searchable-multi-select { position: relative; width: 100%; font-size: 9px; }
        .multi-select-btn, .searchable-btn {
            width: 100%; padding: 2px 4px; background: white; border: 1px solid #94a3b8;
            border-radius: 4px; cursor: pointer; text-align: left; font-size: 9px;
            display: flex; justify-content: space-between; align-items: center; transition: background 0.1s;
        }
        .multi-select-btn.active, .searchable-btn.active { background-color: #dbeafe; border-color: #3b82f6; }
        .multi-select-btn span:first-child, .searchable-btn span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .multi-select-dropdown, .searchable-dropdown {
            position: absolute; top: 100%; left: 0; right: 0; background: white;
            border: 1px solid #ccc; border-radius: 4px; z-index: 100; max-height: 200px;
            overflow-y: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.2); display: none;
        }
        .multi-select-dropdown.show, .searchable-dropdown.show { display: block; }
        .multi-select-option, .searchable-option { padding: 2px 6px; display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .multi-select-option:hover, .searchable-option:hover { background-color: #e2e8f0; }
        .multi-select-option input, .searchable-option input { margin: 0; width: 12px; height: 12px; pointer-events: none; }
        .searchable-input { width: 100%; padding: 2px 4px; border: none; border-bottom: 1px solid #ccc; font-size: 9px; outline: none; }
        
        .btn-export { background: #059669; transition: 0.2s; }
        .btn-export:hover { background: #047857; }
        .btn-reset { background: #dc2626; }
        .rekap-box { background: #f1f5f9; border-radius: 6px; padding: 4px 8px; display: inline-block; margin-right: 8px; }
        .rekap-label { font-size: 9px; font-weight: bold; color: #334155; }
        .rekap-value { font-size: 12px; font-weight: bold; margin-left: 4px; }
        .last-update-panel { background: #fef9e3; border-left: 4px solid #f59e0b; font-size: 9px; max-height: 70px; overflow-y: auto; }
        
        /* Modern Loading Overlay */
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px); transition: opacity 0.3s;
        }
        .loading-content {
            background: white; padding: 24px; border-radius: 16px;
            text-align: center; min-width: 320px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .spinner {
            border: 3px solid #f3f4f6; border-top: 3px solid #3b82f6;
            border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;
            margin: 0 auto 12px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-bar-container { height: 8px; background: #e2e8f0; border-radius: 4px; margin: 16px 0 8px 0; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #3b82f6; transition: width 0.3s ease-out; }
        
        .highlight { background-color: #fde047; color: #1e293b; font-weight: bold; border-radius: 2px; padding: 0 1px; }
        .att-code-pr { color: #15803d; font-weight: bold; background-color: #dcfce7; border-radius: 2px; padding: 0 2px; display: inline-block; }
        .att-code-prs { color: #c2410c; font-weight: bold; background-color: #ffedd5; border-radius: 2px; padding: 0 2px; display: inline-block; }
        .att-code-prp { color: #1e40af; font-weight: bold; background-color: #dbeafe; border-radius: 2px; padding: 0 2px; display: inline-block; }
        .att-code-prm { color: #111827; font-weight: bold; background-color: #e5e7eb; border-radius: 2px; padding: 0 2px; display: inline-block; }
        .att-code-ab, .att-code-lwp { color: #b91c1c; font-weight: bold; background-color: #fee2e2; border-radius: 2px; padding: 0 2px; display: inline-block; }
        .att-code-al, .att-code-ol { color: #2563eb; font-weight: bold; background-color: #eff6ff; border-radius: 2px; padding: 0 2px; display: inline-block; }
        .att-code-ml { color: #111827; font-weight: bold; background-color: #e5e7eb; border-radius: 2px; padding: 0 2px; display: inline-block; }
    </style>
</head>
<body>

<!-- Modern Loading Overlay -->
<div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-content">
        <div class="spinner"></div>
        <div class="text-slate-800 font-bold text-sm mb-1">Memproses Data Absensi</div>
        <div id="loadingDetailText" class="text-xs text-slate-500 mb-2 truncate max-w-[260px] mx-auto font-mono">Menyiapkan...</div>

        <button id="cancelLoadingBtn" class="mt-4 w-full bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 font-bold px-3 py-1.5 rounded-lg text-xs transition">Batalkan Proses</button>

<script>
    // ======================== GLOBAL ========================
    let databaseKaryawan = [];      
    let timeMap = new Map();         
    let semuaTanggal = [];
    let databaseGlobal = [];
    let isProcessing = false;
    let cancelProcessing = false;
    const MAX_BARIS_PER_FILE = 2500;
    
    let filters = {}; // { columnKey: Set(values) }
    let filterOptions = {}; // { columnKey: { values: [], displayValues: [] } }
    
    // DOM elements
    const globalSearch = document.getElementById('globalSearch');
    const tableHeader = document.getElementById('tableHeader');
    const tableBody = document.getElementById('tableBody');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingProgressFill = document.getElementById('loadingProgressFill');
    const loadingProgressText = document.getElementById('loadingProgressText');
    const loadingFileCount = document.getElementById('loadingFileCount');
    const loadingDetailText = document.getElementById('loadingDetailText');
    const tableContainer = document.getElementById('tableContainer');

    // Helper functions
    function showAlert(title, msg) {
        const modal = document.getElementById('modernAlert');
        document.getElementById('alertTitle').innerText = title;
        document.getElementById('alertMessage').innerText = msg;
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }
    function closeAlert() { document.getElementById('modernAlert').classList.add('hidden'); }
    
    // Optimasi Debounce untuk pencarian super cepat
    function debounce(func, wait) {
        let timeout;
        return function(...args) {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, args), wait);
        };
    }

    function formatDateToString(d) {
        if(!d) return "";
        let date;
        if(d instanceof Date) date=d;
        else if(typeof d==='number') date=new Date((d-25569)*86400*1000);
        else date=new Date(d);
        if(isNaN(date.getTime())) return String(d);
        const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return `${String(date.getDate()).padStart(2,'0')}-${months[date.getMonth()]}-${date.getFullYear()}`;
    }
    
    function formatTimeRange(record) {
        if(!record) return "";
        const parts = record.split(';').map(p=>p.trim()).filter(p=>p);
        if(parts.length===0) return "";
        if(parts.length===1) return parts[0];
        return `${parts[0]}-${parts[parts.length-1]}`;
    }

    function displayLastUpdate(filesArray) {
        const panel = document.getElementById('lastUpdateInfo');
        if(!filesArray || filesArray.length === 0) { panel.classList.add('hidden'); return; }
        const validFiles = filesArray.filter(f => f && f.name && f.name.toLowerCase().endsWith('.xlsb'));
        if(validFiles.length === 0) { panel.classList.add('hidden'); return; }
        let html = '<div class="flex items-center gap-2 flex-wrap"><span class="font-bold text-amber-800">📅 LAST UPDATE (Absen Files):</span>';
        for(let file of validFiles) {
            let modDate = new Date(file.lastModified);
            let dateStr = modDate.toLocaleString('id-ID', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
            let fileType = "📄";
            if(file.name.toUpperCase().includes('WORKER')) fileType = "👷 WORKER";
            else if(file.name.toUpperCase().includes('STAFF')) fileType = "👔 STAFF";
            else if(file.name.toUpperCase().includes('SECURITY')) fileType = "🔒 SECURITY";
            html += `<span class="bg-white rounded px-2 py-0.5 shadow-sm text-[9px] border border-amber-100">${fileType} : ${file.name} (${dateStr})</span>`;
        }
        html += '</div>';
        panel.innerHTML = html;
        panel.classList.remove('hidden');
    }
    function clearLastUpdate() { const panel = document.getElementById('lastUpdateInfo'); panel.classList.add('hidden'); panel.innerHTML = ''; }

    function isFileValid(file) { 
        if (!file || file.size === 0) return false;
        if (file.name.startsWith('~$') || file.name.startsWith('._') || file.name.startsWith('.')) return false;
        const path = file.webkitRelativePath || "";
        if (path.includes('__MACOSX') || path.includes('/.')) return false;
        return file.name.toLowerCase().endsWith('.xlsb') && /WORKER|STAFF|SECURITY/i.test(file.name); 
    }
    function isTimeFileValid(file) {
        if (!file || file.size === 0) return false;
        if (file.name.startsWith('~$') || file.name.startsWith('._') || file.name.startsWith('.')) return false;
        const path = file.webkitRelativePath || "";
        if (path.includes('__MACOSX') || path.includes('/.')) return false;
        return true;
    }

    // YIELD function to prevent browser freeze
    const yieldToBrowser = () => new Promise(resolve => setTimeout(resolve, 5));

    async function bacaFileXLSB(file, forcedStatus) {
        return new Promise(async (resolve) => {
            try {
                const data = await readFileAsArrayBuffer(file);
                // OPTIMASI: dense: true mengurangi penggunaan RAM dan mempercepat parsing array
                // cellDates dibiarkan jika masih dibutuhkan, namun raw/dense sangat membantu
                const workbook = XLSX.read(data, { type: 'array', cellDates: true, dense: true });
                let sheetName = workbook.SheetNames.find(s => s.toUpperCase().includes('ATTEND')) || workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                
                let range = XLSX.utils.decode_range(worksheet['!ref'] || "A1:AK1000");
                if(range.e.r > MAX_BARIS_PER_FILE) range.e.r = MAX_BARIS_PER_FILE;
                
                // OPTIMASI: raw: true lebih cepat
                const rawData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "", blankrows: false, range: XLSX.utils.encode_range(range) });
                if(!rawData.length) { resolve(null); return; }
                
                let headerRowIdx = -1, colMap = { id:-1, name:-1, section:-1, position:-1, join:-1 };
                for(let r=0; r<Math.min(rawData.length,15); r++) {
                    const row = rawData[r];
                    if(!row) continue;
                    let hasID=false, hasName=false;
                    for(let c=0;c<row.length;c++) {
                        let val = String(row[c]||"").toUpperCase().replace(/\s/g,'');
                        if(val.includes("NEWID")||val==="IDNO"||val==="ID") hasID=true;
                        if(val==="NAME"||val==="NAMA") hasName=true;
                    }
                    if(hasID && hasName) {
                        headerRowIdx = r;
                        for(let c=0;c<row.length;c++) {
                            let val = String(row[c]||"").toUpperCase().replace(/\s/g,'');
                            if(val.includes("NEWID")||val==="IDNO"||val==="ID") colMap.id = c;
                            else if(val==="NAME"||val==="NAMA") colMap.name = c;
                            else if(val.includes("SECT")) colMap.section = c;
                            else if(val.includes("POSITI")||val.includes("TITLE")) colMap.position = c;
                            else if(val.includes("JOIN")) colMap.join = c;
                        }
                        break;
                    }
                }
                if(headerRowIdx === -1) {
                    headerRowIdx = parseInt(document.getElementById('headerRow').value)-1 || 5;
                    colMap = { id:0, name:1, section:2, position:3, join:4 };
                }
                const headerRow = rawData[headerRowIdx];
                const colTanggal = {};
                for(let c=0; c<headerRow.length; c++) {
                    let val = String(headerRow[c]||"").trim();
                    let numVal = parseInt(val, 10);
                    // FIXED: Hanya ambil angka 1-31, dan ambil yang PERTAMA kali ketemu dari kiri 
                    // (mencegah bentrok dengan kolom summary di ujung kanan tabel)
                    if(/^\d+$/.test(val) && numVal >= 1 && numVal <= 31) {
                        if (colTanggal[numVal] === undefined) {
                            colTanggal[numVal] = c;
                        }
                    }
                }
                
                const karyawanMap = new Map();
                for(let r=headerRowIdx+1; r<rawData.length; r++) {
                    const row = rawData[r];
                    if(!row) continue;
                    let id = String(row[colMap.id]||"").trim();
                    let name = String(row[colMap.name]||"").trim();
                    if(!id && !name) continue;
                    
                    const headerPattern = /^[A-Z]\s?\d+$/i;
                    if (headerPattern.test(id) || headerPattern.test(name)) continue;
                    const summaryWords = ['total', 'grand', 'summary', 'hadir', 'mangkir', 'sakit', 'cuti', 'absen'];
                    if (summaryWords.some(word => id.toLowerCase().includes(word) || name.toLowerCase().includes(word))) continue;
                    
                    let idLow = id.toLowerCase(), nameLow = name.toLowerCase();
                    if (idLow.includes("new id") || idLow.includes("id no") || idLow === "id" || nameLow === "name" || nameLow === "nama" || nameLow.includes("department")) continue;
                    const monthYearRegex = /^(januari|februari|maret|april|mei|juni|juli|agustus|september|oktober|november|desember|jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\s+\d{4}$/i;
                    if (monthYearRegex.test(name) || monthYearRegex.test(id)) continue;
                    
                    let cleanIdLow = idLow.replace(/\s+/g, ' '); let cleanNameLow = nameLow.replace(/\s+/g, ' ');
                    const summaryContains = ["hadir penuh", "full day", "mangkir", "absent w/o", "sakit (sick)", "cuti tahunan", "annual leave", "cuti lain", "other leave"];
                    const summaryExact = ["sakit", "cuti", "total", "hadir"];
                    if (summaryExact.includes(cleanIdLow) || summaryExact.includes(cleanNameLow)) continue;
                    if (summaryContains.some(kw => cleanIdLow.includes(kw) || cleanNameLow.includes(kw))) continue;
                    
                    const kodePerTanggal = {};
                    for(let [tgl, colIdx] of Object.entries(colTanggal)) {
                        let val = row[colIdx];
                        if(val !== undefined && val !== null && val !== "") {
                            // FIXED: Bersihkan karakter tersembunyi/aneh dari sumber asli
                            let cleanVal = String(val).replace(/[\r\n\t]+/g, ' ').replace(/[^\x20-\x7E\u00A0-\u00FF]/g, '').trim();
                            
                            // FIXED: Jika ada kode seperti "H 4", "H 5", dll yang bocor ke data harian, kosongkan
                            if (/^[A-Za-z]\s*\d+$/.test(cleanVal)) {
                                cleanVal = "";
                            }
                            
                            if (cleanVal !== "") {
                                kodePerTanggal[tgl] = cleanVal;
                            }
                        }
                    }
                    const personal = {
                        id: id, name: name, section: String(row[colMap.section]||"").trim(),
                        position: String(row[colMap.position]||"").trim(),
                        joinDate: row[colMap.join] ? formatDateToString(row[colMap.join]) : "",
                        status: forcedStatus, kodePerTanggal: kodePerTanggal
                    };
                    let key = id !== "" ? id.toUpperCase() : name.toUpperCase();
                    if(!karyawanMap.has(key)) karyawanMap.set(key, personal);
                }
                
                // Allow UI to breathe after a heavy loop
                await yieldToBrowser();
                
                if(karyawanMap.size) resolve({ map: karyawanMap, fileName: file.name });
                else resolve(null);
            } catch(e) { console.warn(`File gagal: ${file.name}`, e); resolve(null); }
        });
    }

    function getForcedStatus(fileName) { if(/STAFF/i.test(fileName)) return "STAFF"; if(/SECURITY/i.test(fileName)) return "SECURITY"; return "WORKER"; }

    async function prosesFileExcel(files) {
        if(!files.length) return;
        const valid = files.filter(f => isFileValid(f));
        if(!valid.length) { showAlert("Peringatan","Tidak ada file .xlsb valid (Harus mengandung kata Worker/Staff/Security)"); return; }
        if(isProcessing) { showAlert("Info","Sedang memproses data, harap tunggu"); return; }
        
        isProcessing = true; cancelProcessing = false;
        loadingOverlay.classList.remove('hidden');
        
        const totalFiles = valid.length;
        let processed = 0;
        const masterMap = new Map();
        
        const updateProgressUI = (filename, p_count) => {
            const percent = Math.round((p_count / totalFiles) * 100);
            loadingDetailText.innerText = filename ? `Mengekstrak: ${filename}` : "Menyatukan data...";
            loadingProgressFill.style.width = percent + '%';
            loadingProgressText.innerText = percent + '%';
            loadingFileCount.innerText = `${p_count} / ${totalFiles} file`;
        };

        try {
            updateProgressUI("Mempersiapkan...", 0);
            await yieldToBrowser(); // Force UI update before freezing loop
            
            for(let i=0; i<valid.length; i++) {
                if(cancelProcessing) { showAlert("Dibatalkan","Proses update absen dibatalkan."); break; }
                const file = valid[i];
                
                updateProgressUI(file.name, i); // Show what we are about to process
                await yieldToBrowser(); // YIELD TO UI THREAD

                const forcedStatus = getForcedStatus(file.name);
                const result = await bacaFileXLSB(file, forcedStatus);
                if(result && result.map.size) {
                    for(let [k,v] of result.map) masterMap.set(k, v); 
                }
                
                processed++;
                updateProgressUI(file.name, processed);
                await yieldToBrowser();
            }
            
            if(!cancelProcessing) {
                loadingDetailText.innerText = "Menyusun Database Global...";
                await yieldToBrowser();
                
                if(!masterMap.size) { showAlert("Gagal","Tidak ada data karyawan ditemukan. Periksa format file."); return; }
                databaseKaryawan = Array.from(masterMap.values());
                
                semuaTanggal = [];
                for(let i=26;i<=31;i++) semuaTanggal.push(i);
                for(let i=1;i<=25;i++) semuaTanggal.push(i);
                
                localStorage.setItem('hoplun_karyawan', JSON.stringify(databaseKaryawan));
                localStorage.setItem('hoplun_tanggal', JSON.stringify(semuaTanggal));
                
                loadingDetailText.innerText = "Merender Tabel...";
                await yieldToBrowser();
                
                gabungkanDanRender();
                displayLastUpdate(valid);
                showAlert("Sukses", `${databaseKaryawan.length} karyawan dimuat dengan cepat.`);
            }
        } catch (err) {
            console.error(err); showAlert("Error", "Gagal memproses file: " + err.message);
        } finally {
            isProcessing = false; loadingOverlay.classList.add('hidden');
        }
    }

    async function loadTimeFile(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array', dense: true });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                    if(!rows.length) { resolve(new Map()); return; }
                    let idCol=-1, dateCol=-1, recordCol=-1;
                    for(let i=0;i<Math.min(rows.length,20);i++) {
                        const row = rows[i];
                        for(let c=0;c<row.length;c++) {
                            let cell = String(row[c]||"").toUpperCase();
                            if(cell.includes("ID")) idCol = c;
                            if(cell.includes("DATE")) dateCol = c;
                            if(cell.includes("RECORD")) recordCol = c;
                        }
                        if(idCol!==-1 && dateCol!==-1 && recordCol!==-1) break;
                    }
                    if(idCol===-1 || dateCol===-1 || recordCol===-1) { resolve(new Map()); return; }
                    const timeMapLocal = new Map();
                    for(let r=1; r<rows.length; r++) {
                        const row = rows[r];
                        if(!row) continue;
                        let id = String(row[idCol]||"").trim();
                        let dateRaw = row[dateCol];
                        let dateStr = "";
                        if(dateRaw instanceof Date) dateStr = dateRaw.toISOString().slice(0,10);
                        else if(typeof dateRaw === 'number') dateStr = new Date((dateRaw-25569)*86400*1000).toISOString().slice(0,10);
                        else dateStr = String(dateRaw).trim();
                        let record = String(row[recordCol]||"").trim();
                        if(id && dateStr && record) {
                            let tgl = parseInt(dateStr.split('-')[2], 10);
                            if(!isNaN(tgl)) {
                                const formattedTime = formatTimeRange(record);
                                if(formattedTime) timeMapLocal.set(`${id}_${tgl}`, formattedTime);
                            }
                        }
                    }
                    resolve(timeMapLocal);
                } catch(err) { resolve(new Map()); }
            };
            reader.onerror = () => resolve(new Map());
            reader.readAsArrayBuffer(file);
        });
    }

    function gabungkanDanRender() {
        if(!databaseKaryawan.length) return;
        const finalData = databaseKaryawan.map(karyawan => {
            const tanggalData = {};
            for(let tgl of semuaTanggal) {
                const kode = karyawan.kodePerTanggal?.[String(tgl)] || "";
                const time = timeMap.get(`${karyawan.id}_${tgl}`) || "";
                tanggalData[tgl] = { kode, time };
            }
            return { id: karyawan.id, name: karyawan.name, section: karyawan.section, position: karyawan.position, joinDate: karyawan.joinDate, status: karyawan.status, tanggalData };
        });
        databaseGlobal = finalData;
        const dateFromEl = document.getElementById('dateFrom'); const dateToEl = document.getElementById('dateTo');
        const optFrom = ['<option value="ALL">Dari</option>']; const optTo = ['<option value="ALL">Sampai</option>'];
        for(let t of semuaTanggal) { optFrom.push(`<option value="${t}">${t}</option>`); optTo.push(`<option value="${t}">${t}</option>`); }
        dateFromEl.innerHTML = optFrom.join(''); dateToEl.innerHTML = optTo.join('');
        dateFromEl.value = "ALL"; dateToEl.value = "ALL";
        filters = {};
        precomputeFilterOptions();
        buildFilterHeader();
        renderTable();
        document.getElementById('dbStatus').innerHTML = `✅ DB Karyawan: ${databaseKaryawan.length} | DB Time: ${timeMap.size}`;
    }

    function precomputeFilterOptions() {
        filterOptions = {};
        const fixedColumns = ['id', 'name', 'section', 'position', 'joinDate', 'status'];
        for (let col of fixedColumns) {
            const valueSet = new Set();
            for (let row of databaseGlobal) {
                let val = col === 'joinDate' ? row.joinDate : row[col];
                valueSet.add((val === undefined || val === null || val === "") ? "__EMPTY__" : val);
            }
            const values = Array.from(valueSet).sort((a,b) => (a==="__EMPTY__"?-1:b==="__EMPTY__"?1:String(a).localeCompare(String(b))));
            filterOptions[col] = { values, displayValues: values.map(v => v === "__EMPTY__" ? "Kosong" : v) };
        }
        for (let tgl of semuaTanggal) {
            const key = `date_${tgl}`;
            const valueSet = new Set();
            for (let row of databaseGlobal) {
                const val = getCellDisplayValue(row.tanggalData[tgl]);
                valueSet.add((val && val !== "") ? val : "__EMPTY__");
            }
            const values = Array.from(valueSet).sort((a,b) => (a==="__EMPTY__"?-1:b==="__EMPTY__"?1:String(a).localeCompare(String(b))));
            filterOptions[key] = { values, displayValues: values.map(v => v === "__EMPTY__" ? "Kosong" : v) };
        }
    }

    function getCellDisplayValue(cell) { return !cell ? "" : (cell.time ? cell.time : (cell.kode ? cell.kode : "")); }

    function buildFilterHeader() {
        const fixedCols = [
            { name: "NO", width: 40, filterKey: null }, { name: "ID", width: 70, filterKey: "id" },
            { name: "NAMA", width: 120, filterKey: "name" }, { name: "SECTION", width: 100, filterKey: "section" },
            { name: "POSISI", width: 100, filterKey: "position" }, { name: "JOIN DATE", width: 85, filterKey: "joinDate" },
            { name: "STATUS", width: 75, filterKey: "status" }
        ];
        const range = getTanggalRange();
        const allCols = [...fixedCols, ...range.map(t => ({ name: `Tgl ${t}`, width: 90, filterKey: `date_${t}` }))];
        
        let th = `<tr class="bg-slate-800 text-white text-[10px]">`;
        for(let i=0; i<allCols.length; i++) {
            let col = allCols[i], cls = "px-1 py-1 border-r", ws = `width: ${col.width}px; min-width: ${col.width}px;`;
            if(i===0) cls += " sticky left-0 z-20 bg-slate-800";
            if(i===1) cls += " sticky left-[40px] z-20 bg-slate-800";
            if(i===2) cls += " sticky left-[110px] z-20 bg-slate-800";
            th += `<th style="${ws}" class="${cls}">${col.name}</th>`;
        }
        th += `</tr><tr class="bg-gray-100 text-[9px]">`;
        for(let i=0; i<allCols.length; i++) {
            let col = allCols[i], cls = "px-1 py-0.5 border-r border-slate-200", ws = `width: ${col.width}px; min-width: ${col.width}px;`;
            if(i===0) { cls += " sticky left-0 z-10 bg-gray-100"; ws += "width:40px;"; }
            if(i===1) { cls += " sticky left-[40px] z-10 bg-gray-100"; ws += "width:70px;"; }
            if(i===2) { cls += " sticky left-[110px] z-10 bg-gray-100"; ws += "width:120px;"; }
            th += `<th style="${ws}" class="${cls}" data-colkey="${col.filterKey || ''}"><div class="filter-container" id="filter_${col.filterKey || ''}"></div></th>`;
        }
        th += `</tr>`; tableHeader.innerHTML = th;
        
        for(let col of allCols) {
            if (!col.filterKey) continue;
            const container = document.getElementById(`filter_${col.filterKey}`);
            const options = filterOptions[col.filterKey];
            if (!container || !options) continue;
            if (!filters[col.filterKey]) filters[col.filterKey] = new Set();
            const set = filters[col.filterKey], isSearchable = (col.filterKey === 'position' || col.filterKey.startsWith('date_'));
            if (isSearchable) createSearchableMultiSelect(container, options.values, options.displayValues, set, col.filterKey, () => renderTable());
            else createMultiSelect(container, options.values, options.displayValues, set, col.filterKey, () => renderTable());
        }
    }

    // Menguraikan (un-minify) fungsi untuk mencegah error parsing yang sering muncul pada kode yang terlalu panjang 
    function createMultiSelect(container, values, displayValues, selectedSet, filterKey, onUpdate) {
        container.innerHTML = '';
        const btn = document.createElement('div');
        btn.className = 'multi-select-btn';
        const span = document.createElement('span');
        const arrow = document.createElement('span');
        arrow.innerText = '▼';

        const updateBtnText = () => {
            const count = selectedSet.size;
            span.innerText = count === 0 ? 'Semua' : `${count} terpilih`;
            if(count > 0) btn.classList.add('active');
            else btn.classList.remove('active');
        };
        updateBtnText();
        btn.appendChild(span);
        btn.appendChild(arrow);

        const dropdown = document.createElement('div');
        dropdown.className = 'multi-select-dropdown';

        const allOption = document.createElement('div');
        allOption.className = 'multi-select-option';
        const allCheck = document.createElement('input');
        allCheck.type = 'checkbox';
        allCheck.checked = (selectedSet.size === 0);
        const allLabel = document.createElement('span');
        allLabel.innerText = 'Semua';
        allOption.appendChild(allCheck);
        allOption.appendChild(allLabel);

        allOption.addEventListener('click', (e) => {
            e.stopPropagation();
            if (selectedSet.size === 0) {
                values.forEach(v => selectedSet.add(v));
                allCheck.checked = true;
            } else {
                selectedSet.clear();
                allCheck.checked = false;
            }
            updateCheckboxes();
            updateBtnText();
            onUpdate();
        });
        dropdown.appendChild(allOption);

        const optionElements = [];
        for (let idx = 0; idx < values.length; idx++) {
            const val = values[idx];
            const displayVal = displayValues[idx];
            const option = document.createElement('div');
            option.className = 'multi-select-option';
            
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.checked = selectedSet.has(val);
            
            const label = document.createElement('span');
            label.innerText = displayVal;
            
            option.appendChild(cb);
            option.appendChild(label);
            
            option.addEventListener('click', (e) => {
                e.stopPropagation();
                if (cb.checked) {
                    selectedSet.delete(val);
                    cb.checked = false;
                } else {
                    selectedSet.add(val);
                    cb.checked = true;
                }
                allCheck.checked = (selectedSet.size === 0);
                updateBtnText();
                onUpdate();
            });
            dropdown.appendChild(option);
            optionElements.push({ option, cb, val });
        }

        function updateCheckboxes() {
            allCheck.checked = (selectedSet.size === 0);
            for (let item of optionElements) {
                item.cb.checked = selectedSet.has(item.val);
            }
        }

        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('show');
        });
        
        document.addEventListener('click', function closeDropdown(e) {
            if (!container.contains(e.target)) dropdown.classList.remove('show');
        });

        container.appendChild(btn);
        container.appendChild(dropdown);
    }

    function createSearchableMultiSelect(container, values, displayValues, selectedSet, filterKey, onUpdate) {
        container.innerHTML = '';
        const btn = document.createElement('div');
        btn.className = 'searchable-btn';
        const span = document.createElement('span');
        const arrow = document.createElement('span');
        arrow.innerText = '▼';

        const updateBtnText = () => {

        const optionsContainer = document.createElement('div');
        optionsContainer.style.maxHeight = '150px';
        optionsContainer.style.overflowY = 'auto';
        dropdown.appendChild(optionsContainer);

        let filteredValues = [...values];
        let filteredDisplay = [...displayValues];

        function renderOptions() {
            optionsContainer.innerHTML = '';
            
            const allOption = document.createElement('div');
            allOption.className = 'searchable-option';
            const allCheck = document.createElement('input');
            allCheck.type = 'checkbox';
            allCheck.checked = (selectedSet.size === 0);
            const allLabel = document.createElement('span');
            allLabel.innerText = 'Semua';
            
            allOption.appendChild(allCheck);
            allOption.appendChild(allLabel);
            
            allOption.addEventListener('click', (e) => {
                e.stopPropagation();
                if (selectedSet.size === 0) {
                    values.forEach(v => selectedSet.add(v));
                    allCheck.checked = true;
                } else {
                    selectedSet.clear();
                    allCheck.checked = false;
                }
                updateCheckboxes();
                updateBtnText();
                onUpdate();
            });
            optionsContainer.appendChild(allOption);

            for (let i = 0; i < filteredValues.length; i++) {
                const val = filteredValues[i];
                const displayVal = filteredDisplay[i];
                const option = document.createElement('div');
                option.className = 'searchable-option';
                
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.checked = selectedSet.has(val);
                
                const label = document.createElement('span');
                label.innerText = displayVal;
                
                option.appendChild(cb);
                option.appendChild(label);
                
                option.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (cb.checked) {
                        selectedSet.delete(val);
                        cb.checked = false;
                    } else {
                        selectedSet.add(val);
                        cb.checked = true;
                    }
                    allCheck.checked = (selectedSet.size === 0);
                    updateBtnText();
                    onUpdate();
                });
                optionsContainer.appendChild(option);
            }
        }

        function updateCheckboxes() {
            const allCheck = optionsContainer.querySelector('input');
            if (allCheck) allCheck.checked = (selectedSet.size === 0);
            const checkboxes = optionsContainer.querySelectorAll('.searchable-option input');
            checkboxes.forEach((cb, idx) => {
                if (idx === 0) return;
                const val = filteredValues[idx - 1];
                cb.checked = selectedSet.has(val);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const newValues = [];
            const newDisplay = [];
            for (let i = 0; i < values.length; i++) {
                if (displayValues[i].toLowerCase().includes(term)) {
                    newValues.push(values[i]);
                    newDisplay.push(displayValues[i]);
                }
            }
            filteredValues = newValues;
            filteredDisplay = newDisplay;
            renderOptions();
        });

        renderOptions();

        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('show');
            if (dropdown.classList.contains('show')) {
                searchInput.focus();
                searchInput.select();
            }
        });
        
        document.addEventListener('click', function closeDropdown(e) {
            if (!container.contains(e.target)) dropdown.classList.remove('show');
        });

        container.appendChild(btn);
        container.appendChild(dropdown);
    }

    function getTanggalRange() {
        let from = document.getElementById('dateFrom').value, to = document.getElementById('dateTo').value;
        if(from === "ALL" || to === "ALL") return semuaTanggal;
        let fromIdx = semuaTanggal.indexOf(parseInt(from)), toIdx = semuaTanggal.indexOf(parseInt(to));
        if(fromIdx === -1 || toIdx === -1) return semuaTanggal;
        if(fromIdx <= toIdx) return semuaTanggal.slice(fromIdx, toIdx+1);
        return [...semuaTanggal.slice(fromIdx), ...semuaTanggal.slice(0, toIdx+1)];
    }
    
    // OPTIMASI: Single-Pass Filtering (Jauh lebih cepat dari multiple .filter())
    function applyAllFiltersFast() {
        if (!databaseGlobal.length) return [];
        const searchKeyword = globalSearch.value.trim().toLowerCase();
        const range = getTanggalRange();
        const mode = document.getElementById('filterAttendanceDetail').value;
        
        // Pre-check which filters are active to avoid looping object keys in the main loop
        const activeFilters = [];
        for (let key in filters) { if(filters[key].size > 0) activeFilters.push({key, set: filters[key]}); }
        const hasSearch = searchKeyword !== "";
        const checkMode = mode !== "ALL";

        return databaseGlobal.filter(row => {
            // 1. Check Global Search
            if (hasSearch && !(row.id.toLowerCase().includes(searchKeyword) || row.name.toLowerCase().includes(searchKeyword))) return false;
            
            // 2. Check Multi-Select Filters
            for (let i = 0; i < activeFilters.length; i++) {
                const {key, set} = activeFilters[i];
                if (key.startsWith('date_')) {
                    const tgl = parseInt(key.split('_')[1]);
                    const cellVal = getCellDisplayValue(row.tanggalData[tgl]);
                    if (!set.has(cellVal) && !(cellVal === "" && set.has("__EMPTY__"))) return false;
                } else {
                    let rowVal = key === 'joinDate' ? row.joinDate : row[key];
                    let isEmp = (rowVal === undefined || rowVal === null || rowVal === "");
                    if (!set.has(rowVal) && !(isEmp && set.has("__EMPTY__"))) return false;
                }
            }

            // 3. Check Time Mode
            if (checkMode) {
                let matchMode = false;
                for (let i=0; i<range.length; i++) {
                    const time = row.tanggalData[range[i]]?.time || "";
                    if (mode === "NO_TIME" && !time) { matchMode = true; break; }
                    if (mode === "ONE_TIME" && time && !time.includes('-')) { matchMode = true; break; }
                    if (mode === "FULL_TIME" && time && time.includes('-')) { matchMode = true; break; }
                }
                if (!matchMode) return false;
            }

            return true;
        });
    }

    function updateRekapUtama(dataList) {
        let w=0,s=0,sec=0;
        for(let r of dataList) { if(r.status==="WORKER") w++; else if(r.status==="STAFF") s++; else if(r.status==="SECURITY") sec++; }
        document.getElementById('totalWorker').innerText = w; document.getElementById('totalStaff').innerText = s;
        document.getElementById('totalSecurity').innerText = sec; document.getElementById('totalSemua').innerText = dataList.length;
    }

    function highlightText(text, keyword) {
        if (!keyword) return text;
        const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return text.replace(regex, '<span class="highlight">$1</span>');
    }
    function getAttendanceCodeClass(code) {
        const u = code.toUpperCase();
        if (u==="PR") return "att-code-pr"; if (u==="PRS") return "att-code-prs"; if (u==="PRP") return "att-code-prp";
        if (u==="PRM") return "att-code-prm"; if (u==="AB"||u==="LWP") return "att-code-ab";
        if (u==="AL"||u==="OL") return "att-code-al"; if (u==="ML") return "att-code-ml"; return "";
    }

    // OPTIMASI: Chunked Rendering (Infinite Scroll) untuk mencegah lag saat load dan scroll
    let renderScheduled = false;
    let currentFilteredData = [];
    let currentRenderIndex = 0;
    const CHUNK_SIZE = 75; // Hanya render 75 baris setiap kali

    function renderTable() {
        if (renderScheduled) return;
        renderScheduled = true;
        requestAnimationFrame(() => {
            currentFilteredData = applyAllFiltersFast();
            updateRekapUtama(currentFilteredData);
            
            const range = getTanggalRange();
            if (currentFilteredData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="${7 + range.length}" class="p-4 text-center text-slate-500 font-bold">Tidak ada data yang sesuai filter</td></tr>`;
                renderScheduled = false; return;
            }
            
            // Bersihkan tabel dan reset index render
            tableBody.innerHTML = '';
            currentRenderIndex = 0;
            
            // Render potongan pertama (Sangat Cepat)
            renderNextChunk();
            
            // Kembalikan scroll ke paling atas tiap kali filter berubah
            tableContainer.scrollTop = 0;
            
            renderScheduled = false;
        });
    }

    function renderNextChunk() {
        if (currentRenderIndex >= currentFilteredData.length) return;
        
        const range = getTanggalRange();
        const keyword = globalSearch.value.trim().toLowerCase();
        const htmlChunks = [];
        
        const endIndex = Math.min(currentRenderIndex + CHUNK_SIZE, currentFilteredData.length);
        
        for(let index = currentRenderIndex; index < endIndex; index++) {
            let row = currentFilteredData[index];
            htmlChunks.push(`<tr class="hover:bg-blue-50 border-b transition-colors">`);
            
            let sBadge = row.status==="WORKER"?'<span class="bg-emerald-100 text-emerald-800 font-bold px-1.5 py-0.5 rounded text-[9px]">WORKER</span>':
                         row.status==="STAFF"?'<span class="bg-purple-100 text-purple-800 font-bold px-1.5 py-0.5 rounded text-[9px]">STAFF</span>':
                         '<span class="bg-slate-700 text-white font-bold px-1.5 py-0.5 rounded text-[9px]">SECURITY</span>';
            
            let rId = highlightText(row.id, keyword), rName = highlightText(row.name, keyword);
            htmlChunks.push(
                `<td class="sticky-no px-1 py-0.5 text-slate-500 font-medium" style="width:40px;background:white;">${index+1}</td>`,
                `<td class="sticky-id px-1 py-0.5 font-bold text-slate-800" style="width:70px;background:white;">${rId}</td>`,
                `<td class="sticky-name px-1 py-0.5 text-slate-700 truncate" style="width:120px;background:white;" title="${row.name}">${rName}</td>`,
                `<td class="col-section-fixed px-1 py-0.5 text-slate-600 truncate" style="width:100px;">${row.section}</td>`,
                `<td class="col-posisi-fixed px-1 py-0.5 text-slate-600 truncate" style="width:100px;">${row.position}</td>`,
                `<td class="col-join-fixed px-1 py-0.5 text-slate-500" style="width:85px;">${row.joinDate}</td>`,
                `<td class="col-status-fixed px-1 py-0.5" style="width:75px;">${sBadge}</td>`
            );

            for(let i=0; i<range.length; i++) {
                const dataTgl = row.tanggalData[range[i]] || { kode: "", time: "" };
                let kode = dataTgl.kode, time = dataTgl.time, display = time ? time : (kode ? kode : "—");
                let colorClass = "", codeClass = "";
                if (kode && !time) {
                    codeClass = getAttendanceCodeClass(kode);
                    if (codeClass) display = `<span class="${codeClass} shadow-sm">${display}</span>`;
                    else colorClass = "text-orange-500 font-bold";
                } else if (time && !time.includes('-')) colorClass = "text-blue-600 font-bold";
                else if (time && time.includes('-')) colorClass = "text-emerald-600 font-bold";
                
                htmlChunks.push(`<td class="attendance-col px-1 py-0.5 text-center time-cell ${colorClass}">${display}</td>`);
            }
            htmlChunks.push(`</tr>`);
        }
        
        tableBody.insertAdjacentHTML('beforeend', htmlChunks.join(''));
        currentRenderIndex = endIndex;
    }

    // Deteksi Scroll ke Bawah (Infinite Scroll)
    tableContainer.addEventListener('scroll', () => {
        // Jika scroll sudah mendekati bagian bawah tabel (sisa 400px), muat tabel berikutnya
        if (tableContainer.scrollTop + tableContainer.clientHeight >= tableContainer.scrollHeight - 400) {
            renderNextChunk();
        }
    });

    function openSummary() {
        const filteredData = applyAllFiltersFast();
        if(!filteredData.length) { showAlert("Info","Tidak ada data yang ditampilkan."); return; }
        const summary = new Map();
        let gw=0,gs=0,gsec=0;
        for(const row of filteredData) {
            let pos = row.position || "UNKNOWN";
            if(!summary.has(pos)) summary.set(pos,{WORKER:0,STAFF:0,SECURITY:0,TOTAL:0});
            const d = summary.get(pos);
            if(row.status==="WORKER") { d.WORKER++; gw++; }
            else if(row.status==="STAFF") { d.STAFF++; gs++; }
            else if(row.status==="SECURITY") { d.SECURITY++; gsec++; }
            d.TOTAL++;
        }
        let html = `<table class="w-full border-collapse border border-slate-300 text-[10px] text-left"><thead><tr class="bg-slate-700 text-white"><th class="p-2 border border-slate-600">POSISI JABATAN</th><th class="p-2 border border-slate-600 text-center">WORKER</th><th class="p-2 border border-slate-600 text-center">STAFF</th><th class="p-2 border border-slate-600 text-center">SECURITY</th><th class="p-2 border border-slate-600 text-center font-bold text-yellow-300">TOTAL</th></tr></thead><tbody>`;
        for(let [pos,data] of [...summary.entries()].sort()) html += `<tr class="hover:bg-slate-50"><td class="border border-slate-300 p-2 font-medium text-slate-700">${pos}</td><td class="border border-slate-300 p-2 text-center text-emerald-700 font-bold">${data.WORKER}</td><td class="border border-slate-300 p-2 text-center text-purple-700 font-bold">${data.STAFF}</td><td class="border border-slate-300 p-2 text-center text-slate-700 font-bold">${data.SECURITY}</td><td class="border border-slate-300 p-2 text-center font-bold text-blue-700 bg-blue-50">${data.TOTAL}</td></tr>`;
        html += `<tr class="bg-slate-800 text-white font-bold text-[11px]"><td class="p-2 border border-slate-700 text-right">GRAND TOTAL KESELURUHAN</td><td class="text-center p-2 border border-slate-700 text-emerald-300">${gw}</td><td class="text-center p-2 border border-slate-700 text-purple-300">${gs}</td><td class="text-center p-2 border border-slate-700 text-slate-300">${gsec}</td><td class="text-center p-2 border border-slate-700 text-yellow-300 text-[12px]">${gw+gs+gsec}</td></tr></tbody></table>`;
        document.getElementById('summaryContent').innerHTML = html;
        document.getElementById('summaryModal').classList.remove('hidden'); document.getElementById('summaryModal').classList.add('flex');
    }
    function closeSummary() { document.getElementById('summaryModal').classList.add('hidden'); }
    
    function exportToExcel() {
        const filteredData = applyAllFiltersFast();
        if(!filteredData.length) { showAlert("Peringatan","Tidak ada data untuk diexport"); return; }
        const range = getTanggalRange();
        const headers = ["NO", "ID", "NAMA", "SECTION", "POSISI", "JOIN DATE", "STATUS", ...range.map(t => `Tgl ${t}`)];
        const wsData = [headers];
        for(let i=0; i<filteredData.length; i++) {
            const row = filteredData[i];
            const rowArr = [i+1, row.id, row.name, row.section, row.position, row.joinDate, row.status];
            for(let tgl of range) {
                const dataTgl = row.tanggalData[tgl] || { kode: "", time: "" };
                rowArr.push(dataTgl.time ? dataTgl.time : (dataTgl.kode ? dataTgl.kode : ""));
            }
            wsData.push(rowArr);
        }
        const ws = XLSX.utils.aoa_to_sheet(wsData); const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Attendance");
        XLSX.writeFile(wb, `Hoplun_Attendance_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.xlsx`);
    }

    function readFileAsArrayBuffer(file) { return new Promise((resolve,reject)=>{ const fr=new FileReader(); fr.onload=e=>resolve(e.target.result); fr.onerror=()=>reject(new Error("Gagal membaca file")); fr.readAsArrayBuffer(file); }); }
    
    // Event Listeners
    document.getElementById('fileUpload').addEventListener('change', async (e) => { 
        if(e.target.files.length) { await prosesFileExcel(Array.from(e.target.files)); e.target.value = ""; }
    });
    
    document.getElementById('hiddenFolderInput').addEventListener('change', async (e) => {
        try {
            const files = Array.from(e.target.files);
            if(files.length === 0) return;
            document.getElementById('folderXlsbDisplay').value = files[0].webkitRelativePath ? files[0].webkitRelativePath.split('/')[0] : "Folder terpilih";
            const xlsbFiles = files.filter(file => isFileValid(file));
            if (xlsbFiles.length === 0) { showAlert("Peringatan", "File .xlsb valid (Worker/Staff/Security) tidak ditemukan di folder."); return; }
            await prosesFileExcel(xlsbFiles);
        } catch (error) { showAlert("Error", "Gagal membaca folder: " + error.message); } finally { e.target.value = ""; }
    });
    
    document.getElementById('cancelLoadingBtn').addEventListener('click', () => { if(isProcessing) cancelProcessing = true; });
    
    document.getElementById('hiddenTimeInput').addEventListener('change', async (e) => {
        try {
            if(!e.target.files.length) return;
            const file = e.target.files[0];
            if (!isTimeFileValid(file)) { showAlert("Error", "File time tidak valid."); e.target.value = ""; return; }
            
            document.getElementById('fileTimeDisplay').value = file.name;
            loadingOverlay.classList.remove('hidden');
            loadingDetailText.innerText = `Memproses Data Time: ${file.name}`;
            await yieldToBrowser();
            
            const newTimeMap = await loadTimeFile(file);
            if (newTimeMap.size) {
                timeMap = newTimeMap;
                localStorage.setItem('hoplun_time', JSON.stringify(Object.fromEntries(timeMap)));
                if (databaseKaryawan.length) gabungkanDanRender();
                else showAlert("Info", `Data Time tersimpan. Silakan Update Absen (Folder) dulu.`);
            } else { showAlert("Gagal", `File Time (${file.name}) kosong atau format salah.`); }
        } catch (error) { showAlert("Error", "Gagal membaca file: " + error.message); } 
        finally { loadingOverlay.classList.add('hidden'); e.target.value = ""; }
    });
    
    // OPTIMASI: Pasang Debounce agar pencarian ID/Nama tidak freeze saat diketik cepat (Delay 250ms)
    globalSearch.addEventListener('input', debounce(() => renderTable(), 250));
    
    document.getElementById('dateFrom').addEventListener('change', () => { buildFilterHeader(); renderTable(); });
    document.getElementById('dateTo').addEventListener('change', () => { buildFilterHeader(); renderTable(); });
    document.getElementById('filterAttendanceDetail').addEventListener('change', renderTable);
    document.getElementById('btnExport').addEventListener('click', exportToExcel);
    document.getElementById('resetDataBtn').addEventListener('click', () => {
        if(confirm("Yakin ingin menghapus seluruh data database dari browser?")) { 
            localStorage.clear(); databaseKaryawan=[]; timeMap.clear(); databaseGlobal=[]; filters={}; renderTable(); document.getElementById('dbStatus').innerHTML="Menunggu Data..."; clearLastUpdate(); showAlert("Reset","Data berhasil dihapus dari memori."); 
        }
    });
    
    // Auto Load Data on Start
    (function loadStored() {
        const karyawan = localStorage.getItem('hoplun_karyawan');
        const tanggal = localStorage.getItem('hoplun_tanggal');
        const timeObj = localStorage.getItem('hoplun_time');
        if(karyawan && tanggal) {
            databaseKaryawan = JSON.parse(karyawan);
            semuaTanggal = JSON.parse(tanggal);
            if(timeObj) timeMap = new Map(Object.entries(JSON.parse(timeObj)));
            if(databaseKaryawan.length) gabungkanDanRender();
        }
        clearLastUpdate();
    })();
</script>
