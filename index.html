<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hoplun - Attendance Dashboard (Super Cepat)</title>
    <link rel="icon" type="image/png" href="hoplun128.png">
    <link rel="shortcut icon" href="hoplun128.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        * { font-size: 11px; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            margin: 0; 
            padding: 8px; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }
        .dashboard-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .table-container { 
            flex: 1; 
            overflow: auto; 
            border: 1px solid #e2e8f0; 
            border-radius: 8px; 
            background: white;
        }
        table { 
            border-collapse: collapse; 
            width: 100%;
            table-layout: auto;
        }
        th { 
            position: sticky; 
            top: 0; 
            background-color: #1e293b; 
            color: white; 
            z-index: 10; 
            padding: 6px 4px; 
            font-weight: 600; 
            font-size: 10px;
            white-space: nowrap;
        }
        td { 
            padding: 4px 4px; 
            border-bottom: 1px solid #e2e8f0;
            white-space: nowrap;
        }
        .attendance-col { 
            min-width: 90px; 
            text-align: center; 
        }
        .time-cell { 
            font-family: monospace; 
            font-size: 9px; 
            white-space: pre-line; 
        }
        /* STICKY COLUMNS WITH FIXED WIDTH (TIDAK BERUBAH SAAT FILTER TANGGAL) */
        .sticky-no { 
            position: sticky; 
            left: 0; 
            background-color: white; 
            z-index: 9; 
            width: 40px !important;
            min-width: 40px !important;
            max-width: 40px !important;
            text-align: center; 
        }
        .sticky-id { 
            position: sticky; 
            left: 40px; 
            background-color: white; 
            z-index: 9; 
            width: 70px !important;
            min-width: 70px !important;
            max-width: 70px !important;
        }
        .sticky-name { 
            position: sticky; 
            left: 110px; 
            background-color: white; 
            z-index: 9; 
            width: 120px !important;
            min-width: 120px !important;
            max-width: 120px !important;
        }
        .col-section-fixed { width: 100px !important; min-width: 100px !important; }
        .col-posisi-fixed { width: 100px !important; min-width: 100px !important; }
        .col-join-fixed { width: 85px !important; min-width: 85px !important; }
        .col-status-fixed { width: 75px !important; min-width: 75px !important; }
        
        .filter-select {
            width: 100%;
            padding: 2px 4px;
            font-size: 9px;
            border: 1px solid #94a3b8;
            border-radius: 4px;
            margin-top: 2px;
            background-color: white;
            color: #1e293b;
            box-sizing: border-box;
        }
        .btn-export { background: #059669; transition: 0.2s; }
        .btn-export:hover { background: #047857; }
        .btn-reset { background: #dc2626; }
        .rekap-box { background: #f1f5f9; border-radius: 6px; padding: 4px 8px; display: inline-block; margin-right: 8px; }
        .rekap-label { font-size: 9px; font-weight: bold; color: #334155; }
        .rekap-value { font-size: 12px; font-weight: bold; margin-left: 4px; }
        .last-update-panel {
            background: #fef9e3;
            border-left: 4px solid #f59e0b;
            font-size: 9px;
            max-height: 70px;
            overflow-y: auto;
        }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            backdrop-filter: blur(2px);
        }
        .loading-content {
            background: #1e293b;
            padding: 16px 24px;
            border-radius: 12px;
            text-align: center;
            min-width: 260px;
        }
        .progress-bar {
            height: 6px;
            background: #334155;
            border-radius: 3px;
            margin: 12px 0;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #10b981;
            transition: width 0.2s;
        }
    </style>
</head>

    <!-- REKAP & FILTER UTAMA (unchanged) -->

<!-- Modals (same) -->
<div id="summaryModal" class="hidden fixed inset-0 bg-black/60 z-40 items-center justify-center p-4"><div class="bg-white rounded-lg w-full max-w-4xl max-h-[85vh] flex flex-col"><div class="p-2 border-b bg-slate-800 text-white rounded-t-lg flex justify-between"><h2 class="text-sm font-bold">Summary (Data Terfilter)</h2><button onclick="closeSummary()" class="text-gray-300">✕</button></div><div class="p-2 overflow-auto" id="summaryContent"></div></div></div>
<div id="modernAlert" class="hidden fixed inset-0 bg-black/60 z-50 items-center justify-center"><div class="bg-white rounded-xl p-3 max-w-xs text-center"><div id="alertIcon"></div><h3 id="alertTitle" class="text-sm font-bold mb-1"></h3><p id="alertMessage" class="text-xs mb-3"></p><button onclick="closeAlert()" class="w-full bg-blue-600 text-white py-1 rounded text-xs">Mengerti</button></div></div>

<!-- Loading overlay -->
<div id="loadingOverlay" class="loading-overlay hidden">

        <div id="loadingProgressText" class="text-xs text-gray-300 mb-1">0 / 0</div>

<script>
    // ======================== GLOBAL ========================
    let databaseKaryawan = [];      
    let timeMap = new Map();         
    let semuaTanggal = [];
    let databaseGlobal = [];
    let isProcessing = false;         // flag to prevent concurrent processing
    let cancelProcessing = false;     // user cancel flag

    const MAX_BARIS_PER_FILE = 2500;

    // DOM
    const fileUpload = document.getElementById('fileUpload');
    const timeUpload = document.getElementById('timeUpload');
    const headerRowInput = document.getElementById('headerRow');
    const dateFrom = document.getElementById('dateFrom');
    const dateTo = document.getElementById('dateTo');
    const filterAttendanceDetailSelect = document.getElementById('filterAttendanceDetail');
    const btnExport = document.getElementById('btnExport');
    const resetDataBtn = document.getElementById('resetDataBtn');
    const tableHeader = document.getElementById('tableHeader');
    const tableBody = document.getElementById('tableBody');
    const dbStatus = document.getElementById('dbStatus');
    const totalWorkerSpan = document.getElementById('totalWorker');
    const totalStaffSpan = document.getElementById('totalStaff');
    const totalSecuritySpan = document.getElementById('totalSecurity');
    const totalSemuaSpan = document.getElementById('totalSemua');
    const globalSearch = document.getElementById('globalSearch');
    const lastUpdatePanel = document.getElementById('lastUpdateInfo');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingProgressText = document.getElementById('loadingProgressText');
    const loadingProgressFill = document.getElementById('loadingProgressFill');
    const cancelLoadingBtn = document.getElementById('cancelLoadingBtn');
    
    const hiddenFolderInput = document.getElementById('hiddenFolderInput');
    const folderXlsbDisplay = document.getElementById('folderXlsbDisplay');
    const hiddenTimeInput = document.getElementById('hiddenTimeInput');
    const fileTimeDisplay = document.getElementById('fileTimeDisplay');

    // Helper functions (showAlert, formatDateToString, etc.) remain same
    function showAlert(title, msg, type='info') {
        const modal = document.getElementById('modernAlert');
        document.getElementById('alertTitle').innerText = title;
        document.getElementById('alertMessage').innerText = msg;
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        setTimeout(() => { if(modal) modal.classList.add('hidden'); }, 3000);
    }
    function closeAlert() { document.getElementById('modernAlert').classList.add('hidden'); }
    
    function formatDateToString(d) {
        if(!d) return "";
        let date;
        if(d instanceof Date) date=d;
        else if(typeof d==='number') date=new Date((d-25569)*86400*1000);
        else date=new Date(d);
        if(isNaN(date.getTime())) return String(d);
        const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return `${String(date.getDate()).padStart(2,'0')}-${months[date.getMonth()]}-${date.getFullYear()}`;
    }
    function formatTimeRange(record) {
        if(!record) return "";
        const parts = record.split(';').map(p=>p.trim()).filter(p=>p);
        if(parts.length===0) return "";
        if(parts.length===1) return parts[0];
        return `${parts[0]}-${parts[parts.length-1]}`;
    }

    // ================= LAST UPDATE ====================
    function displayLastUpdate(filesArray) {
        if(!filesArray || filesArray.length === 0) { lastUpdatePanel.classList.add('hidden'); return; }
        const validFiles = filesArray.filter(f => f && f.name && f.name.toLowerCase().endsWith('.xlsb'));
        if(validFiles.length === 0) { lastUpdatePanel.classList.add('hidden'); return; }
        let html = '<div class="flex items-center gap-2 flex-wrap"><span class="font-bold text-amber-800">📅 LAST UPDATE (Absen Files):</span>';
        for(let file of validFiles) {
            let modDate = new Date(file.lastModified);
            let dateStr = modDate.toLocaleString('id-ID', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
            let fileType = "📄";
            if(file.name.toUpperCase().includes('WORKER')) fileType = "👷 WORKER";
            else if(file.name.toUpperCase().includes('STAFF')) fileType = "👔 STAFF";
            else if(file.name.toUpperCase().includes('SECURITY')) fileType = "🔒 SECURITY";
            html += `<span class="bg-white rounded px-2 py-0.5 shadow-sm text-[9px]">${fileType} : ${file.name} (${dateStr})</span>`;
        }
        html += '</div>';
        lastUpdatePanel.innerHTML = html;
        lastUpdatePanel.classList.remove('hidden');
    }
    function clearLastUpdate() { lastUpdatePanel.classList.add('hidden'); lastUpdatePanel.innerHTML = ''; }

    // ================= VALIDASI FILE ====================
    function isFileValid(file) { 
        if (!file || file.size === 0) return false;
        if (file.name.startsWith('~$') || file.name.startsWith('._') || file.name.startsWith('.')) return false;
        const path = file.webkitRelativePath || "";
        if (path.includes('__MACOSX') || path.includes('/.')) return false;
        return file.name.toLowerCase().endsWith('.xlsb') && /WORKER|STAFF|SECURITY/i.test(file.name); 
    }
    function isTimeFileValid(file) {
        if (!file || file.size === 0) return false;
        if (file.name.startsWith('~$') || file.name.startsWith('._') || file.name.startsWith('.')) return false;
        const path = file.webkitRelativePath || "";
        if (path.includes('__MACOSX') || path.includes('/.')) return false;
        return true;
    }

    // ================= BACA FILE XLSB (SAME LOGIC) ====================
    async function bacaFileXLSB(file, forcedStatus) {
        return new Promise(async (resolve) => {
            try {
                const data = await readFileAsArrayBuffer(file);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                let sheetName = workbook.SheetNames.find(s => s.toUpperCase().includes('ATTEND')) || workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                let range = XLSX.utils.decode_range(worksheet['!ref'] || "A1:AK1000");
                if(range.e.r > MAX_BARIS_PER_FILE) range.e.r = MAX_BARIS_PER_FILE;
                const rawData = XLSX.utils.sheet_to_json(worksheet, { header:1, defval:"", blankrows:false, range: XLSX.utils.encode_range(range) });
                if(!rawData.length) { resolve(null); return; }
                let headerRowIdx = -1, colMap = { id:-1, name:-1, section:-1, position:-1, join:-1 };
                for(let r=0; r<Math.min(rawData.length,15); r++) {
                    const row = rawData[r];
                    if(!row) continue;
                    let hasID=false, hasName=false;
                    for(let c=0;c<row.length;c++) {
                        let val = String(row[c]||"").toUpperCase().replace(/\s/g,'');
                        if(val.includes("NEWID")||val==="IDNO"||val==="ID") hasID=true;
                        if(val==="NAME"||val==="NAMA") hasName=true;
                    }
                    if(hasID && hasName) {
                        headerRowIdx = r;
                        for(let c=0;c<row.length;c++) {
                            let val = String(row[c]||"").toUpperCase().replace(/\s/g,'');
                            if(val.includes("NEWID")||val==="IDNO"||val==="ID") colMap.id = c;
                            else if(val==="NAME"||val==="NAMA") colMap.name = c;
                            else if(val.includes("SECT")) colMap.section = c;
                            else if(val.includes("POSITI")||val.includes("TITLE")) colMap.position = c;
                            else if(val.includes("JOIN")) colMap.join = c;
                        }
                        break;
                    }
                }
                if(headerRowIdx === -1) {
                    headerRowIdx = parseInt(headerRowInput.value)-1 || 5;
                    colMap = { id:0, name:1, section:2, position:3, join:4 };
                }
                const headerRow = rawData[headerRowIdx];
                const colTanggal = {};
                for(let c=0; c<headerRow.length; c++) {
                    let val = String(headerRow[c]||"").trim();
                    if(/^\d+$/.test(val)) colTanggal[val] = c;
                }
                const karyawanMap = new Map();
                for(let r=headerRowIdx+1; r<rawData.length; r++) {
                    const row = rawData[r];
                    if(!row) continue;
                    let id = String(row[colMap.id]||"").trim();
                    let name = String(row[colMap.name]||"").trim();
                    if(!id && !name) continue;
                    let idLow = id.toLowerCase();
                    let nameLow = name.toLowerCase();
                    if (idLow.includes("new id") || idLow.includes("id no") || idLow === "id" || nameLow === "name" || nameLow === "nama" || nameLow.includes("department")) continue;
                    const monthYearRegex = /^(januari|februari|maret|april|mei|juni|juli|agustus|september|oktober|november|desember|jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\s+\d{4}$/i;
                    if (monthYearRegex.test(name) || monthYearRegex.test(id)) continue;
                    let cleanIdLow = idLow.replace(/\s+/g, ' ');
                    let cleanNameLow = nameLow.replace(/\s+/g, ' ');
                    const summaryContains = ["hadir penuh", "full day", "mangkir", "absent w/o", "sakit (sick)", "cuti tahunan", "annual leave", "cuti lain", "other leave"];
                    const summaryExact = ["sakit", "cuti", "total", "hadir"];
                    if (summaryExact.includes(cleanIdLow) || summaryExact.includes(cleanNameLow)) continue;
                    if (summaryContains.some(kw => cleanIdLow.includes(kw) || cleanNameLow.includes(kw))) continue;
                    const kodePerTanggal = {};
                    for(let [tgl, colIdx] of Object.entries(colTanggal)) {
                        let val = row[colIdx];
                        if(val !== undefined && val !== null && val !== "") kodePerTanggal[tgl] = String(val).trim();
                    }
                    const personal = {
                        id: id, name: name, section: String(row[colMap.section]||"").trim(),
                        position: String(row[colMap.position]||"").trim(),
                        joinDate: row[colMap.join] ? formatDateToString(row[colMap.join]) : "",
                        status: forcedStatus, kodePerTanggal: kodePerTanggal
                    };
                    let key = id !== "" ? id.toUpperCase() : name.toUpperCase();
                    if(!karyawanMap.has(key)) karyawanMap.set(key, personal);
                }
                if(karyawanMap.size) resolve({ map: karyawanMap, fileName: file.name });
                else resolve(null);
            } catch(e) { console.warn(`File gagal: ${file.name}`, e); resolve(null); }
        });
    }

    function getForcedStatus(fileName) { if(/STAFF/i.test(fileName)) return "STAFF"; if(/SECURITY/i.test(fileName)) return "SECURITY"; return "WORKER"; }

    // ================= PROSES FILE DENGAN YIELD (SUPER CEPAT & NON-BLOCKING) ====================
    async function prosesFileExcel(files) {
        if(!files.length) return;
        const valid = files.filter(f => isFileValid(f));
        if(!valid.length) { showAlert("Peringatan","Tidak ada file .xlsb valid","warning"); return; }
        if(isProcessing) { showAlert("Info","Sedang memproses data, harap tunggu","info"); return; }
        isProcessing = true;
        cancelProcessing = false;
        
        // Tampilkan loading overlay
        loadingOverlay.classList.remove('hidden');
        const totalFiles = valid.length;
        let processed = 0;
        const masterMap = new Map();
        
        // Fungsi untuk update progress
        const updateProgress = (count) => {
            const percent = (count / totalFiles) * 100;
            loadingProgressFill.style.width = percent + '%';
            loadingProgressText.innerText = `${count} / ${totalFiles} file diproses`;
        };
        
        try {
            for(let i=0; i<valid.length; i++) {
                if(cancelProcessing) {
                    showAlert("Dibatalkan","Proses update absen dibatalkan oleh user.","warning");
                    break;
                }
                const file = valid[i];
                const forcedStatus = getForcedStatus(file.name);
                const result = await bacaFileXLSB(file, forcedStatus);
                if(result && result.map.size) {
                    for(let [k,v] of result.map) {
                        if(!masterMap.has(k)) masterMap.set(k, v);
                    }
                }
                processed++;
                updateProgress(processed);
                // Yield control to browser after each file to keep UI responsive
                await new Promise(resolve => setTimeout(resolve, 0));
            }
            
            if(!cancelProcessing) {
                if(!masterMap.size) {
                    showAlert("Gagal","Tidak ada data karyawan ditemukan. Periksa format file.","error");
                    return;
                }
                databaseKaryawan = Array.from(masterMap.values());
                semuaTanggal = [];
                for(let i=26;i<=31;i++) semuaTanggal.push(i);
                for(let i=1;i<=25;i++) semuaTanggal.push(i);
                
                localStorage.setItem('hoplun_karyawan', JSON.stringify(databaseKaryawan.map(k => ({ ...k, kodePerTanggal: k.kodePerTanggal }))));
                localStorage.setItem('hoplun_tanggal', JSON.stringify(semuaTanggal));
                gabungkanDanRender();
                displayLastUpdate(valid);
                showAlert("Sukses", `${databaseKaryawan.length} karyawan dimuat dari ${processed} file.`, "success");
            }
        } catch (err) {
            console.error(err);
            showAlert("Error", "Gagal memproses file: " + err.message, "error");
        } finally {
            isProcessing = false;
            loadingOverlay.classList.add('hidden');
        }
    }

    // ================= BACA TIME FILE ====================
    async function loadTimeFile(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                    if(!rows.length) { resolve(new Map()); return; }
                    let idCol=-1, dateCol=-1, recordCol=-1;
                    for(let i=0;i<Math.min(rows.length,20);i++) {
                        const row = rows[i];
                        for(let c=0;c<row.length;c++) {
                            let cell = String(row[c]||"").toUpperCase();
                            if(cell.includes("ID")) idCol = c;
                            if(cell.includes("DATE")) dateCol = c;
                            if(cell.includes("RECORD")) recordCol = c;
                        }
                        if(idCol!==-1 && dateCol!==-1 && recordCol!==-1) break;
                    }
                    if(idCol===-1 || dateCol===-1 || recordCol===-1) { resolve(new Map()); return; }
                    const timeMapLocal = new Map();
                    for(let r=1; r<rows.length; r++) {
                        const row = rows[r];
                        if(!row) continue;
                        let id = String(row[idCol]||"").trim();
                        let dateRaw = row[dateCol];
                        let dateStr = "";
                        if(dateRaw instanceof Date) dateStr = dateRaw.toISOString().slice(0,10);
                        else if(typeof dateRaw === 'number') dateStr = new Date((dateRaw-25569)*86400*1000).toISOString().slice(0,10);
                        else dateStr = String(dateRaw).trim();
                        let record = String(row[recordCol]||"").trim();
                        if(id && dateStr && record) {
                            let tgl = parseInt(dateStr.split('-')[2], 10);
                            if(!isNaN(tgl)) {
                                const formattedTime = formatTimeRange(record);
                                if(formattedTime) timeMapLocal.set(`${id}_${tgl}`, formattedTime);
                            }
                        }
                    }
                    resolve(timeMapLocal);
                } catch(err) { resolve(new Map()); }
            };
            reader.onerror = () => resolve(new Map());
            reader.readAsArrayBuffer(file);
        });
    }

    // ================= GABUNGKAN & RENDER ====================
    function gabungkanDanRender() {
        if(!databaseKaryawan.length) return;
        const finalData = databaseKaryawan.map(karyawan => {
            const tanggalData = {};
            for(let tgl of semuaTanggal) {
                const kode = karyawan.kodePerTanggal?.[String(tgl)] || "";
                const time = timeMap.get(`${karyawan.id}_${tgl}`) || "";
                tanggalData[tgl] = { kode, time };
            }
            return { id: karyawan.id, name: karyawan.name, section: karyawan.section, position: karyawan.position, joinDate: karyawan.joinDate, status: karyawan.status, tanggalData };
        });
        databaseGlobal = finalData;
        const optFrom = ['<option value="ALL">Dari</option>'];
        const optTo = ['<option value="ALL">Sampai</option>'];
        for(let t of semuaTanggal) { optFrom.push(`<option value="${t}">${t}</option>`); optTo.push(`<option value="${t}">${t}</option>`); }
        dateFrom.innerHTML = optFrom.join('');
        dateTo.innerHTML = optTo.join('');
        dateFrom.value = "ALL"; dateTo.value = "ALL";
        renderTableWithFilters();
        dbStatus.innerHTML = `✅ Karyawan: ${databaseKaryawan.length} | Absen: ${timeMap.size}`;
    }

    // ================= FILTER & RENDER (SAME AS BEFORE) ====================
    function getTanggalRange() {
        let from = dateFrom.value, to = dateTo.value;
        if(from === "ALL" || to === "ALL") return semuaTanggal;
        let fromIdx = semuaTanggal.indexOf(parseInt(from)), toIdx = semuaTanggal.indexOf(parseInt(to));
        if(fromIdx === -1 || toIdx === -1) return semuaTanggal;
        if(fromIdx <= toIdx) return semuaTanggal.slice(fromIdx, toIdx+1);
        else return [...semuaTanggal.slice(fromIdx), ...semuaTanggal.slice(0, toIdx+1)];
    }
    
    function getFilteredByColumn() {
        if(!databaseGlobal.length) return [];
        let filtered = [...databaseGlobal];
        const searchKeyword = (globalSearch.value || "").toLowerCase().trim();
        if(searchKeyword !== "") filtered = filtered.filter(r => r.id.toLowerCase().includes(searchKeyword) || r.name.toLowerCase().includes(searchKeyword));
        const idFilter = document.getElementById('filter_id')?.value || "ALL";
        const nameFilter = document.getElementById('filter_name')?.value || "ALL";
        const sectionFilter = document.getElementById('filter_section')?.value || "ALL";
        const positionFilter = document.getElementById('filter_position')?.value || "ALL";
        const statusFilter = document.getElementById('filter_status')?.value || "ALL";
        if(idFilter !== "ALL") filtered = filtered.filter(r => r.id === idFilter);
        if(nameFilter !== "ALL") filtered = filtered.filter(r => r.name === nameFilter);
        if(sectionFilter !== "ALL") filtered = filtered.filter(r => r.section === sectionFilter);
        if(positionFilter !== "ALL") filtered = filtered.filter(r => r.position === positionFilter);
        if(statusFilter !== "ALL") filtered = filtered.filter(r => r.status === statusFilter);
        return filtered;
    }
    
    function applyAttendanceDetailFilter(data, range) {
        const mode = filterAttendanceDetailSelect.value;
        if(mode === "ALL") return data;
        return data.filter(row => {
            for(let tgl of range) {
                const item = row.tanggalData[tgl] || { kode: "", time: "" };
                const time = item.time;
                if(mode === "NO_TIME" && !time) return true;
                if(mode === "ONE_TIME" && time && !time.includes('-')) return true;
                if(mode === "FULL_TIME" && time && time.includes('-')) return true;
            }
            return false;
        });
    }
    
    function updateRekapUtama(dataList) {
        let worker=0,staff=0,security=0;
        for(let row of dataList) {
            if(row.status === "WORKER") worker++;
            else if(row.status === "STAFF") staff++;
            else if(row.status === "SECURITY") security++;
        }
        totalWorkerSpan.innerText = worker;
        totalStaffSpan.innerText = staff;
        totalSecuritySpan.innerText = security;
        totalSemuaSpan.innerText = dataList.length;
    }

    function renderTableWithFilters() {
        const fixedCols = [
            { name: "NO", width: 40, filterKey: null, styleClass: "sticky-no" },
            { name: "ID", width: 70, filterKey: "id", styleClass: "sticky-id" },
            { name: "NAMA", width: 120, filterKey: "name", styleClass: "sticky-name" },
            { name: "SECTION", width: 100, filterKey: "section", styleClass: "col-section-fixed" },
            { name: "POSISI", width: 100, filterKey: "position", styleClass: "col-posisi-fixed" },
            { name: "JOIN DATE", width: 85, filterKey: null, styleClass: "col-join-fixed" },
            { name: "STATUS", width: 75, filterKey: "status", styleClass: "col-status-fixed" }
        ];
        if(!databaseGlobal.length) {
            tableHeader.innerHTML = ''; tableBody.innerHTML = '<tr><td colspan="7" class="p-4 text-center">Belum ada data</td></tr>';
            updateRekapUtama([]); return;
        }
        let filteredByColumn = getFilteredByColumn();
        const range = getTanggalRange();
        let filteredData = applyAttendanceDetailFilter(filteredByColumn, range);
        updateRekapUtama(filteredData);
        const tanggalCols = range.map(t => ({ name: `Tgl ${t}`, width: 90, filterKey: null }));
        const allCols = [...fixedCols, ...tanggalCols];
        // HEADER ROW 1
        let th = `<tr class="bg-slate-800 text-white text-[10px]">`;
        for(let i=0; i<allCols.length; i++) {
            let col = allCols[i];
            let cls = "px-1 py-1 border-r";
            let widthStyle = `width: ${col.width}px; min-width: ${col.width}px;`;
            if(i===0) cls += " sticky left-0 z-20 bg-slate-800";
            if(i===1) cls += " sticky left-[40px] z-20 bg-slate-800";
            if(i===2) cls += " sticky left-[110px] z-20 bg-slate-800";
            th += `<th style="${widthStyle}" class="${cls}">${col.name}</th>`;
        }
        th += `</tr><tr class="bg-gray-100 text-[9px]">`;
        // HEADER ROW 2 (FILTER)
        for(let i=0; i<allCols.length; i++) {
            let col = allCols[i];
            let cls = "px-1 py-0.5 border-r border-slate-200";
            let widthStyle = `width: ${col.width}px; min-width: ${col.width}px;`;
            if(i===0) { cls += " sticky left-0 z-10 bg-gray-100"; widthStyle += "width:40px;"; }
            if(i===1) { cls += " sticky left-[40px] z-10 bg-gray-100"; widthStyle += "width:70px;"; }
            if(i===2) { cls += " sticky left-[110px] z-10 bg-gray-100"; widthStyle += "width:120px;"; }
            if(col.filterKey) {
                let baseDataForDropdown = (globalSearch.value.trim() !== "") ? filteredData : databaseGlobal;
                let uniqueValues = [...new Set(baseDataForDropdown.map(r => r[col.filterKey]).filter(v => v && v !== ""))].sort();
                let selectedVal = document.getElementById(`filter_${col.filterKey}`)?.value || "ALL";
                let options = `<option value="ALL" ${selectedVal === "ALL" ? "selected" : ""}>Semua</option>`;
                for(let val of uniqueValues) options += `<option value="${val.replace(/"/g, '&quot;')}" ${val === selectedVal ? "selected" : ""}>${val}</option>`;
                th += `<th style="${widthStyle}" class="${cls}"><select id="filter_${col.filterKey}" class="filter-select" style="width:100%">${options}</select></th>`;
            } else {
                th += `<th style="${widthStyle}" class="${cls}"></th>`;
            }
        }
        th += `</tr>`;
        tableHeader.innerHTML = th;
        for(let col of fixedCols) if(col.filterKey) {
            const sel = document.getElementById(`filter_${col.filterKey}`);
            if(sel) sel.addEventListener('change', () => renderTableWithFilters());
        }
        // BODY
        let tb = "";
        const max = Math.min(filteredData.length, 2000);
        for(let index=0; index<max; index++) {
            let row = filteredData[index];
            tb += `<tr class="hover:bg-blue-50 border-b">`;
            const fixedVals = [index+1, row.id, row.name, row.section, row.position, row.joinDate, row.status];
            const fixedStyles = ["width:40px;", "width:70px;", "width:120px;", "width:100px;", "width:100px;", "width:85px;", "width:75px;"];
            const fixedClasses = ["sticky-no", "sticky-id", "sticky-name", "col-section-fixed", "col-posisi-fixed", "col-join-fixed", "col-status-fixed"];
            for(let i=0; i<fixedVals.length; i++) {
                let val = fixedVals[i];
                let extra = fixedClasses[i];
                let style = fixedStyles[i] + "background:white;";
                if(i===6) {
                    if(val==="WORKER") val='<span class="bg-emerald-100 px-1 rounded">WORKER</span>';
                    else if(val==="STAFF") val='<span class="bg-purple-100 px-1 rounded">STAFF</span>';
                    else if(val==="SECURITY") val='<span class="bg-slate-700 text-white px-1 rounded">SECURITY</span>';
                }
                tb += `<td class="${extra} px-1 py-0.5" style="${style}">${val}</td>`;
            }
            for(let tgl of range) {
                const dataTgl = row.tanggalData[tgl] || { kode: "", time: "" };
                let kode = dataTgl.kode, time = dataTgl.time;
                let display = time ? time : (kode ? kode : "—");
                let colorClass = "";
                if(kode && !time) colorClass = "text-orange-500 font-semibold";
                else if(time && !time.includes('-')) colorClass = "text-blue-600 font-bold";
                else if(time && time.includes('-')) colorClass = "text-green-600 font-bold";
                tb += `<td class="attendance-col px-1 py-0.5 text-center time-cell ${colorClass}">${display}</td>`;
            }
            tb += `</tr>`;
        }
        if(filteredData.length > 2000) tb += `<tr><td colspan="${allCols.length}" class="p-1 text-center text-blue-500">Hanya 2000 baris pertama</td></tr>`;
        tableBody.innerHTML = tb;
    }

    // ================= SUMMARY & EXPORT (unchanged) ====================
    function openSummary() {
        let filteredByColumn = getFilteredByColumn();
        const range = getTanggalRange();
        let filteredData = applyAttendanceDetailFilter(filteredByColumn, range);
        if(!filteredData.length) { showAlert("Info","Tidak ada data","info"); return; }
        const summary = new Map();
        let gw=0,gs=0,gsec=0;
        for(const row of filteredData) {
            let pos = row.position || "UNKNOWN";
            let stat = row.status;
            if(!summary.has(pos)) summary.set(pos,{WORKER:0,STAFF:0,SECURITY:0,TOTAL:0});
            const d = summary.get(pos);
            if(stat==="WORKER") { d.WORKER++; gw++; }
            else if(stat==="STAFF") { d.STAFF++; gs++; }
            else if(stat==="SECURITY") { d.SECURITY++; gsec++; }
            d.TOTAL++;
        }
        let html = `<table class="w-full border text-[9px]"><thead><tr class="bg-slate-700 text-white"><th class="p-1">POSISI</th><th>WORKER</th><th>STAFF</th><th>SECURITY</th><th>TOTAL</th></tr></thead><tbody>`;
        for(let [pos,data] of [...summary.entries()].sort()) html += `<tr><td class="border p-1">${pos}</td><td class="border p-1 text-center">${data.WORKER}</td><td class="border p-1 text-center">${data.STAFF}</td><td class="border p-1 text-center">${data.SECURITY}</td><td class="border p-1 text-center font-bold">${data.TOTAL}</td></tr>`;
        html += `<tr class="bg-indigo-100 font-bold"><td class="p-1">GRAND TOTAL</td><td class="text-center">${gw}</td><td class="text-center">${gs}</td><td class="text-center">${gsec}</td><td class="text-center">${gw+gs+gsec}</td></tr></tbody>`;
        document.getElementById('summaryContent').innerHTML = html;
        document.getElementById('summaryModal').classList.remove('hidden'); document.getElementById('summaryModal').classList.add('flex');
    }
    function closeSummary() { document.getElementById('summaryModal').classList.add('hidden'); }
    function exportToExcel() {
        let filteredByColumn = getFilteredByColumn();
        const range = getTanggalRange();
        let filteredData = applyAttendanceDetailFilter(filteredByColumn, range);
        if(!filteredData.length) { showAlert("Tidak ada data","","warning"); return; }
        const fixedCols = ["NO", "ID", "NAMA", "SECTION", "POSISI", "JOIN DATE", "STATUS"];
        const tanggalCols = range.map(t => `Tgl ${t}`);
        const headers = [...fixedCols, ...tanggalCols];
        const wsData = [headers];
        let rowIndex = 1;
        for(const row of filteredData) {
            const rowArr = [rowIndex++, row.id, row.name, row.section, row.position, row.joinDate, row.status];
            for(let tgl of range) {
                const dataTgl = row.tanggalData[tgl] || { kode: "", time: "" };
                let display = dataTgl.time ? dataTgl.time : (dataTgl.kode ? dataTgl.kode : "");
                rowArr.push(display);
            }
            wsData.push(rowArr);
        }
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Attendance");
        XLSX.writeFile(wb, `hoplun_attendance_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.xlsx`);
        showAlert("Berhasil","Data diekspor","success");
    }

    function readFileAsArrayBuffer(file) { return new Promise((resolve,reject)=>{ const fr=new FileReader(); fr.onload=e=>resolve(e.target.result); fr.onerror=()=>reject(); fr.readAsArrayBuffer(file); }); }
    
    // ================= EVENT LISTENERS ====================
    fileUpload.addEventListener('change', async (e) => { 
        if(e.target.files.length) {
            const filesArr = Array.from(e.target.files);
            await prosesFileExcel(filesArr);
            e.target.value = "";
        }
    });
    
    hiddenFolderInput.addEventListener('change', async (e) => {
        try {
            const files = Array.from(e.target.files);
            if(files.length === 0) return;
            const firstPath = files[0].webkitRelativePath;
            const folderName = firstPath ? firstPath.split('/')[0] : "Folder terpilih";
            folderXlsbDisplay.value = folderName;
            const xlsbFiles = files.filter(file => isFileValid(file));
            if (xlsbFiles.length === 0) {
                showAlert("Peringatan", "Tidak ditemukan file .xlsb valid (Worker/Staff/Security) di folder tersebut.", "warning");
                return;
            }
            await prosesFileExcel(xlsbFiles);
        } catch (error) {
            console.error(error);
            showAlert("Error", "Gagal membaca folder: " + error.message, "error");
        } finally {
            e.target.value = "";
        }
    });
    
    cancelLoadingBtn.addEventListener('click', () => {
        if(isProcessing) {
            cancelProcessing = true;
            showAlert("Info","Membatalkan proses...","info");
        }
    });
    
    timeUpload.addEventListener('change', async (e) => {
        if(!e.target.files.length) return;
        const file = e.target.files[0];
        if (!isTimeFileValid(file)) { showAlert("Error","File time tidak valid","error"); e.target.value=""; return; }
        const newTimeMap = await loadTimeFile(file);
        if(newTimeMap.size) {
            timeMap = newTimeMap;
            localStorage.setItem('hoplun_time', JSON.stringify(Object.fromEntries(timeMap)));
            if(databaseKaryawan.length) gabungkanDanRender();
            else showAlert("Info","Data time tersimpan. Upload .xlsb dulu.","info");
        } else { showAlert("Gagal","Tidak ada data time valid","error"); }
        e.target.value = "";
    });
    hiddenTimeInput.addEventListener('change', async (e) => {
        try {
            if(!e.target.files.length) return;
            const file = e.target.files[0];
            if (!isTimeFileValid(file)) {
                showAlert("Error", "File time tidak valid atau merupakan file temporary sistem.", "error");
                e.target.value = "";
                return;
            }
            fileTimeDisplay.value = file.name;
            const newTimeMap = await loadTimeFile(file);
            if (newTimeMap.size) {
                timeMap = newTimeMap;
                localStorage.setItem('hoplun_time', JSON.stringify(Object.fromEntries(timeMap)));
                if (databaseKaryawan.length) gabungkanDanRender();
                else showAlert("Info", `Data Time tersimpan. Silakan Update Absen (Folder) dulu.`, "info");
            } else { showAlert("Gagal", `File Time (${file.name}) kosong.`, "error"); }
        } catch (error) {
            console.error(error);
            showAlert("Error", "Gagal membaca file: " + error.message, "error");
        } finally {
            e.target.value = "";
        }
    });
    
    globalSearch.addEventListener('input', () => renderTableWithFilters());
    dateFrom.addEventListener('change', () => renderTableWithFilters());
    dateTo.addEventListener('change', () => renderTableWithFilters());
    filterAttendanceDetailSelect.addEventListener('change', () => renderTableWithFilters());
    btnExport.addEventListener('click', exportToExcel);
    resetDataBtn.addEventListener('click', () => {
        if(confirm("Hapus semua data?")) { localStorage.clear(); databaseKaryawan=[]; timeMap.clear(); databaseGlobal=[]; renderTableWithFilters(); dbStatus.innerHTML="Kosong"; clearLastUpdate(); showAlert("Reset","Data dihapus","success"); }
    });
    
    (function loadStored() {
        const karyawan = localStorage.getItem('hoplun_karyawan');
        const tanggal = localStorage.getItem('hoplun_tanggal');
        const timeObj = localStorage.getItem('hoplun_time');
        if(karyawan && tanggal) {
            databaseKaryawan = JSON.parse(karyawan);
            semuaTanggal = JSON.parse(tanggal);
            if(timeObj) timeMap = new Map(Object.entries(JSON.parse(timeObj)));
            if(databaseKaryawan.length) gabungkanDanRender();
        }
        clearLastUpdate();
    })();
</script>
